[defaults]
inventory = inventory.ini
host_key_checking = False
interpreter_python = auto_silent
# YAML-formatted task output. The old `stdout_callback = yaml` (community.general)
# was removed in community.general 12 — use the built-in default + result_format.
stdout_callback = default
result_format = yaml
nocows = True

[ssh_connection]
pipelining = True
