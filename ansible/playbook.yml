---
# Crema — one-shot provisioning of a freshly flashed Pi (OS + Wi-Fi + SSH ready).
# Installs Node (nvm), clones the repo, builds native modules, and everything
# install-pi.sh does, in a single run:
#
#   ansible-playbook playbook.yml --ask-become-pass
#
# Idempotent: re-running only changes what drifted. Tags let you scope a re-run:
#   --tags deploy   git pull + npm install, then auto restart Node + reload
#                   Chromium when the code actually changed
#   --tags service  only the systemd server unit
#   --tags transport  only the broker pin drop-in (hosts with crema_broker_url)
#   --tags display  only the Chromium kiosk autostart
#   --tags watchdog  only the USB Wi-Fi watchdog (wifi_dongle group)
#   --tags reload   force restart Node + reload Chromium, no pull (opt-in)
#   --tags reboot   reboot the targeted Pis, one at a time (opt-in, never auto)

- name: Crema — install on each Pi
  hosts: crema
  gather_facts: true
  vars:
    # Extra Environment= lines baked into crema.service (e.g. pin a broker).
    # Empty by default: config.js derives OWNER from hostname, TRANSPORT=dual.
    #   crema_env: { CREMA_TRANSPORT: broker, CREMA_BROKER_URL: "ws://10.0.0.5:4000" }
    crema_env: {}

  tasks:
    # install-pi.sh steps 4 & 5: apt packages.
    - name: Install system packages (build tools + emoji font)
      become: true
      ansible.builtin.apt:
        name:
          - git
          - build-essential   # better-sqlite3 / mdns have no armv7 prebuild
          - python3
          - libavahi-compat-libdnssd-dev  # dns_sd.h — mdns native build needs it
          - curl              # nvm installs itself over curl
          - ca-certificates
          - fonts-noto-color-emoji
        state: present
        update_cache: true
        cache_valid_time: 3600

    # --- Node bootstrap (nvm) — so one run provisions a freshly flashed Pi ---
    # start.sh sources ~/.nvm, so we keep the proven nvm model (not apt). Per-user,
    # no sudo. Idempotent: nvm via `creates:`, node via the "already installed" check.
    - name: Install nvm
      ansible.builtin.shell: |
        curl -fsSL https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.1/install.sh | bash
      args:
        executable: /bin/bash
        creates: "{{ ansible_facts.env.HOME }}/.nvm/nvm.sh"

    - name: Install Node.js 20 via nvm and set it as default
      ansible.builtin.shell: |
        export NVM_DIR="$HOME/.nvm"
        [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
        nvm install 20
        nvm alias default 20
      args:
        executable: /bin/bash
      register: nvm_node
      changed_when: "'is already installed' not in nvm_node.stdout"

    # --- Deploy: clone the repo + npm install. Runs by default (one-shot install);
    # also scriptable on its own via `--tags deploy` to update code later. ---
    # Notifies both handlers so a code-only pull (no package.json change) still
    # restarts the Node server AND reloads the kiosk — backend edits land in the
    # server, frontend edits (public/, theme.css) land on the screen.
    - name: Clone or update the Crema repo
      tags: [deploy]
      ansible.builtin.git:
        repo: "{{ crema_repo }}"
        dest: "{{ crema_dir }}"
        version: "{{ crema_branch }}"
        update: true
      notify:
        - Restart crema
        - Reload display

    - name: Install npm dependencies (compiles native modules on the Pi)
      tags: [deploy]
      ansible.builtin.shell: |
        export NVM_DIR="$HOME/.nvm"
        [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
        npm install --no-audit --no-fund
      args:
        chdir: "{{ crema_dir }}"
        executable: /bin/bash
      register: npm_install
      changed_when: >-
        ('added' in npm_install.stdout) or ('changed' in npm_install.stdout)
        or ('removed' in npm_install.stdout)
      notify: Restart crema

    # install-pi.sh step (chmod): make the launchers executable.
    - name: Make launcher scripts executable
      ansible.builtin.file:
        path: "{{ crema_dir }}/{{ item }}"
        mode: "0755"
      loop:
        - start.sh
        - start-display.sh

    # V7.2 per-Pi screen profile (data/screen-profile, gitignored).
    # data/ is gitignored and only created at runtime by store.js on the first
    # server start — so on a freshly cloned Pi it doesn't exist yet, and the
    # copy below (which doesn't create parent dirs) would fail. Create it first.
    - name: Ensure data directory exists
      ansible.builtin.file:
        path: "{{ crema_dir }}/data"
        state: directory
        mode: "0755"
      when: crema_screen | default('') | length > 0

    - name: Set screen profile
      ansible.builtin.copy:
        dest: "{{ crema_dir }}/data/screen-profile"
        content: "{{ crema_screen }}\n"
        mode: "0644"
      when: crema_screen | default('') | length > 0

    # install-pi.sh step 1: systemd unit for the Node server.
    - name: Install crema.service
      become: true
      tags: [service]
      ansible.builtin.template:
        src: crema.service.j2
        dest: /etc/systemd/system/crema.service
        mode: "0644"
      notify:
        - Reload systemd
        - Restart crema

    - name: Enable and start crema.service
      become: true
      tags: [service]
      ansible.builtin.systemd:
        name: crema.service
        enabled: true
        state: started
        daemon_reload: true

    # Optional broker pin (dual mode, p2p fallback) — Ansible equivalent of
    # pin-broker.sh. Writes the SAME drop-in, so it's a single source and
    # reset-transport.sh still undoes it. Additive: only managed when
    # crema_broker_url is set, never auto-removed — a default run won't clobber
    # a hand-pinned Pi (e.g. pi-aurel on the cloud broker). To pin a host, set
    # crema_broker_url (and optionally crema_broker_token) in the inventory.
    - name: Ensure systemd drop-in directory exists (broker pin)
      become: true
      tags: [transport]
      ansible.builtin.file:
        path: /etc/systemd/system/crema.service.d
        state: directory
        mode: "0755"
      when: crema_broker_url | default('') | length > 0

    - name: Pin broker URL (dual mode) via systemd drop-in
      become: true
      tags: [transport]
      ansible.builtin.template:
        src: transport.conf.j2
        dest: /etc/systemd/system/crema.service.d/transport.conf
        mode: "0644"
      when: crema_broker_url | default('') | length > 0
      notify:
        - Reload systemd
        - Restart crema

    # install-pi.sh step 2: Chromium kiosk autostart (user scope, no sudo).
    - name: Ensure autostart directory exists
      tags: [display]
      ansible.builtin.file:
        path: "{{ ansible_facts.env.HOME }}/.config/autostart"
        state: directory
        mode: "0755"

    - name: Install crema-display.desktop autostart entry
      tags: [display]
      ansible.builtin.template:
        src: crema-display.desktop.j2
        dest: "{{ ansible_facts.env.HOME }}/.config/autostart/crema-display.desktop"
        mode: "0644"

    # install-pi.sh step 3: disable screen blanking (X11 + Wayland).
    - name: Check for raspi-config
      ansible.builtin.command: which raspi-config
      register: raspi_config
      changed_when: false
      failed_when: false

    - name: Disable screen blanking
      become: true
      ansible.builtin.command: raspi-config nonint do_blanking 1
      register: blanking
      changed_when: false
      when: raspi_config.rc == 0

    # Forced restart/reload, no pull — for debugging or after a manual edit on
    # the Pi. `never` keeps these out of a full provisioning run; they fire only
    # on an explicit `--tags reload`. Mirrors the manual `pkill chromium`
    # workflow: start-display.sh's loop reopens the kiosk ~3s later.
    - name: Restart crema server (forced)
      become: true
      tags: [reload, never]
      ansible.builtin.systemd:
        name: crema.service
        state: restarted

    - name: Reload the Chromium kiosk (forced)
      tags: [reload, never]
      ansible.builtin.command: pkill -f chromium
      register: pkill_forced
      changed_when: pkill_forced.rc == 0
      failed_when: pkill_forced.rc not in [0, 1]

  handlers:
    - name: Reload systemd
      become: true
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Restart crema
      become: true
      ansible.builtin.systemd:
        name: crema.service
        state: restarted

    # No become: the kiosk runs under the SSH/session user, not root. pkill
    # returns rc 1 when nothing matched (kiosk already down) — not an error.
    - name: Reload display
      ansible.builtin.command: pkill -f chromium
      register: pkill_display
      changed_when: pkill_display.rc == 0
      failed_when: pkill_display.rc not in [0, 1]


# Equivalent of wifi-watchdog-on.sh — only on Pis with a USB Wi-Fi dongle.
- name: Crema — USB Wi-Fi watchdog (V7.2)
  hosts: wifi_dongle
  gather_facts: false
  tags: [watchdog]
  vars:
    watchdog_iface: wlan0
    watchdog_driver: rtl8xxxu

  tasks:
    - name: Install watchdog worker script
      become: true
      ansible.builtin.template:
        src: wifi-watchdog.sh.j2
        dest: /usr/local/bin/wifi-watchdog.sh
        mode: "0755"
      notify: Restart wifi-watchdog

    - name: Install wifi-watchdog.service
      become: true
      ansible.builtin.template:
        src: wifi-watchdog.service.j2
        dest: /etc/systemd/system/wifi-watchdog.service
        mode: "0644"
      notify:
        - Reload systemd
        - Restart wifi-watchdog

    - name: Enable and start wifi-watchdog.service
      become: true
      ansible.builtin.systemd:
        name: wifi-watchdog.service
        enabled: true
        state: started
        daemon_reload: true

  handlers:
    - name: Reload systemd
      become: true
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Restart wifi-watchdog
      become: true
      ansible.builtin.systemd:
        name: wifi-watchdog.service
        state: restarted


# Reboot the Pis — opt-in only (`--tags reboot`). `never` + the explicit tag
# keep it out of every other run, so a routine deploy can't reboot a Pi by
# accident. serial: 1 reboots one Pi at a time and waits for it to come back,
# so the fleet's screens never all go dark at once. Scope further with --limit.
- name: Crema — reboot Pis (opt-in, one at a time)
  hosts: crema
  gather_facts: false
  serial: 1
  tags: [reboot, never]

  tasks:
    - name: Reboot and wait for the Pi to come back
      become: true
      ansible.builtin.reboot:
        reboot_timeout: 300
