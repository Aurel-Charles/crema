# Crema — Ansible inventory.
# Runs from BOTH the Mac and the Semaphore CI runner. Targets the Pis over SSH.
#
# Addressing: prefer static IPs (DHCP reservations on the router) over .local.
# An IP resolves from anywhere on the LAN; .local needs mDNS (libnss-mdns +
# avahi + LAN multicast), which a CI runner usually lacks — that broke the
# Semaphore deploy. IPs work identically from the Mac, so we use them here.
# Pin each MAC -> IP as a DHCP reservation so these never drift:
#   pi-test  192.168.1.198  dc:a6:32:43:46:36
#   pi-desk  192.168.1.192  28:ee:52:19:a1:2b   (USB Wi-Fi dongle MAC)
#
# SSH usernames differ per Pi (see CLAUDE.md memory "pi-ssh-usernames"):
# always set ansible_user explicitly, otherwise publickey is refused.
# Verify each one with: ssh <user>@<ansible_host> true

[crema]
# pi-aurel / pi-slibar: still on .local — switch to a reserved IP (like below)
# before deploying them from the CI runner; .local only resolves from the Mac.
pi-aurel  ansible_host=pi-aurel.local  ansible_user=aurel
pi-slibar ansible_host=pi-slibar.local ansible_user=pi    crema_screen=
pi-test   ansible_host=192.168.1.198   ansible_user=pi   crema_screen=  #crema_broker_url=wss://crema-broker.fr
pi-desk   ansible_host=192.168.1.192   ansible_user=pi   crema_screen=sm

# Pis on a USB Wi-Fi dongle that needs the rtl8xxxu watchdog (V7.2).
# Built-in Wi-Fi Pis don't belong here.
[wifi_dongle]
pi-desk

[crema:vars]
# Path of the cloned repo on each Pi. Adjust if you clone elsewhere.
crema_dir=/home/{{ ansible_user }}/crema
# Git source — only used by the optional `deploy` tag (clone/pull + npm install).
crema_repo=https://github.com/Aurel-Charles/crema.git
crema_branch=main
