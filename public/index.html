<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <title>Crema</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f7f7f8;
      color: #1a1410;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    header {
      padding: 24px 20px 8px;
    }
    h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    p.subtitle {
      margin: 4px 0 0;
      color: #6b6b70;
      font-size: 14px;
    }
    form {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 24px 20px;
      gap: 16px;
    }
    textarea {
      flex: 1;
      min-height: 140px;
      resize: none;
      padding: 16px;
      font-size: 18px;
      font-family: inherit;
      border: 1px solid #e2e2e6;
      border-radius: 14px;
      background: #fff;
      color: inherit;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    textarea:focus {
      border-color: #f4a65a;
      box-shadow: 0 0 0 3px rgba(244, 166, 90, 0.2);
    }
    button {
      padding: 16px;
      font-size: 17px;
      font-weight: 600;
      font-family: inherit;
      color: #fff;
      background: #1a1410;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.05s;
    }
    button:active { transform: scale(0.98); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .status {
      min-height: 20px;
      font-size: 14px;
      text-align: center;
      color: #6b6b70;
    }
    .status.ok { color: #2d7a3a; }
    .status.err { color: #b3261e; }
  </style>
</head>
<body>
  <header>
    <h1>Crema</h1>
    <p class="subtitle">Envoyer un message sur l'écran</p>
  </header>
  <form id="form">
    <textarea id="text" placeholder="Ton message…" autocomplete="off" required></textarea>
    <div class="status" id="status"></div>
    <button type="submit" id="send">Envoyer</button>
  </form>

  <script>
    const form = document.getElementById('form');
    const textEl = document.getElementById('text');
    const btn = document.getElementById('send');
    const status = document.getElementById('status');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const text = textEl.value.trim();
      if (!text) return;

      btn.disabled = true;
      status.textContent = 'Envoi…';
      status.className = 'status';

      try {
        const res = await fetch('/send', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text }),
        });
        if (!res.ok) throw new Error('Échec');
        status.textContent = 'Envoyé';
        status.className = 'status ok';
        textEl.value = '';
      } catch (err) {
        status.textContent = 'Erreur, réessaie';
        status.className = 'status err';
      } finally {
        btn.disabled = false;
        setTimeout(() => { status.textContent = ''; status.className = 'status'; }, 2000);
      }
    });
  </script>
</body>
</html>
