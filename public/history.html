<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#FBF1E2" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Crema" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/svg+xml" href="/icon.svg" />
  <link rel="apple-touch-icon" href="/icon.svg" />
  <title>Crema — Historique</title>
  <script src="/appearance.js"></script>
  <link rel="stylesheet" href="/theme.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--crema-bg);
      color: var(--crema-text);
      min-height: 100vh;
      overflow-x: hidden;  /* filet de sécurité : aucun scroll horizontal */
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    header {
      padding: 24px 20px 0;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .back {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      color: var(--crema-text);
      text-decoration: none;
      border-radius: 12px;
      transition: background 0.15s;
    }
    .back:active { background: var(--crema-stroke-faint); }
    h1 {
      margin: 0;
      font-family: var(--crema-font-serif);
      font-style: normal;
      font-size: 36px;
      font-weight: 400;
      line-height: 1;
      letter-spacing: -0.01em;
      color: var(--crema-text);
    }
    h1 .accent {
      font-style: italic;
      color: var(--crema-accent-deep);
    }

    main {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      /* Le fil se lit en colonne : centré et plafonné pour ne pas s'étirer sur
       * toute la largeur d'un écran desktop (cartes trop larges, milieu vide). */
      width: 100%;
      max-width: 820px;
      margin: 0 auto;
    }
    /* En-tête aligné sur la largeur du fil (même colonne centrée) */
    header { max-width: 820px; margin: 0 auto; width: 100%; box-sizing: border-box; }

    /* Day headers — signature kerned, sized for hierarchy */
    .day h2 {
      margin: 0 0 10px;
      padding: 0 4px;
      font-size: 13px;
      color: var(--crema-muted);
    }

    .messages {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .msg-card {
      background: var(--crema-surface);
      border: 1px solid var(--crema-stroke-faint);
      border-radius: 14px;
      /* padding-left = 26px : laisse la gouttière du point arc-en-ciel
       * (.msg-card::before dans theme.css). Sans ça, le raccourci écrase le
       * padding-left de theme.css et le point chevauche le texte. */
      padding: 12px 14px 12px 26px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .msg-card.expired { opacity: 0.6; }

    .msg-meta {
      display: flex;
      align-items: center;
      flex-wrap: wrap;        /* nom long + heure + badge passent à la ligne */
      gap: 6px 10px;
      min-width: 0;
      font-size: 13px;
      color: var(--crema-muted);
      font-variant-numeric: tabular-nums;
    }
    /* Direction by typography — A → F (mono, both initials equal weight) */
    .msg-meta .direction {
      font-family: var(--crema-font-mono);
      font-weight: 700;
      color: var(--crema-text);
      letter-spacing: 0.05em;
    }
    .msg-meta .direction .arrow {
      color: var(--crema-muted);
      font-weight: 400;
      margin: 0 3px;
    }
    /* Mobile : initiales compactes (A → F). Desktop : noms complets, plus
     * d'espace donc plus de détail. Les deux sont dans le markup ; on bascule
     * en CSS au breakpoint. */
    .msg-meta .direction .full { display: none; }
    @media (min-width: 700px) {
      .msg-meta .direction .full { display: inline; }
      .msg-meta .direction .init { display: none; }
      .msg-meta .direction { letter-spacing: 0.01em; }
    }
    .msg-meta .time { color: var(--crema-muted); }
    .msg-meta .status {
      margin-left: auto;
      font-size: 11px;
      padding: 2px 9px;
      border-radius: 999px;
      line-height: 1.5;
    }
    /* Reply-channel glyph inside the "répondu" badge — sized down a touch and
     * nudged onto the baseline so the emoji doesn't inflate the pill. */
    .msg-meta .status .chan {
      font-size: 10px;
      margin-left: 1px;
      vertical-align: 1px;
    }
    /* Only "en attente" wears the attention gold — design rule */
    .status-pending {
      background: var(--crema-attention);
      color: var(--crema-accent-ink);
      font-weight: 600;
    }
    /* Read / replied / expired all neutral: stroke pill + mono lowercase */
    .status-read,
    .status-replied,
    .status-expired {
      background: transparent;
      border: 1px solid var(--crema-stroke);
      color: var(--crema-muted);
      font-family: var(--crema-font-mono);
      font-weight: 500;
    }

    .reply-context {
      font-size: 13px;
      color: var(--crema-muted);
      font-style: italic;
      line-height: 1.4;
      padding-left: 10px;
      border-left: 2px solid var(--crema-stroke-faint);
      overflow-wrap: anywhere;  /* un long mot/URL ne déborde plus la carte */
    }

    .msg-text {
      font-size: 16px;
      line-height: 1.4;
      white-space: pre-wrap;
      word-wrap: break-word;
      overflow-wrap: anywhere;
    }
    .msg-card.msg-in.is-reply .msg-text::before {
      content: "↩";
      color: var(--crema-muted);
      margin-right: 6px;
      font-weight: 400;
    }
    .msg-card.msg-out.is-reply .msg-text::before {
      content: "↩";
      color: var(--crema-muted);
      margin-right: 6px;
      font-weight: 400;
    }

    .msg-options {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 2px;
    }
    .opt {
      font-size: 11px;
      padding: 3px 8px;
      background: var(--crema-stroke-faint);
      border-radius: 999px;
      color: var(--crema-muted);
    }

    .empty {
      text-align: center;
      padding: 40px 20px;
      color: var(--crema-muted);
      font-size: 14px;
    }

    .loading {
      text-align: center;
      padding: 30px 20px;
      color: var(--crema-muted);
      font-size: 13px;
    }
  </style>
</head>
<body>
  <header>
    <a href="/" class="back" aria-label="Retour">←</a>
    <h1><span class="accent">le</span> fil</h1>
  </header>

  <main id="main">
    <div class="loading">Chargement…</div>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js').catch(() => {});
    }

    const mainEl = document.getElementById('main');

    // owner → display name (nickname || owner). History is indexed by owner
    // (stable); names are resolved at render time so a renamed peer never
    // rewrites the past. Built from /me (self) + /peers (others).
    let nameMap = {};
    function nameFor(owner) {
      if (!owner) return owner;
      return nameMap[owner] || owner;
    }
    async function loadNames() {
      const next = {};
      try {
        const me = await (await fetch('/me')).json();
        if (me.owner) next[me.owner] = me.nickname || me.owner;
      } catch {}
      try {
        const peers = await (await fetch('/peers')).json();
        for (const p of peers) if (p.owner) next[p.owner] = p.nickname || p.owner;
      } catch {}
      nameMap = next;
    }

    const timeFmt = new Intl.DateTimeFormat('fr-FR', { hour: '2-digit', minute: '2-digit', hour12: false });
    const dayFmt = new Intl.DateTimeFormat('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });

    function esc(s) {
      return String(s).replace(/[&<>"']/g, (c) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
      }[c]));
    }

    function todayKey() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    }

    function offsetKey(daysAgo) {
      const d = new Date();
      d.setDate(d.getDate() - daysAgo);
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    }

    function dayLabel(dateKey) {
      if (dateKey === todayKey()) return "Aujourd'hui";
      if (dateKey === offsetKey(1)) return 'Hier';
      const [y, m, d] = dateKey.split('-').map(Number);
      const label = dayFmt.format(new Date(y, m - 1, d));
      return label.charAt(0).toUpperCase() + label.slice(1);
    }

    function statusLabel(status) {
      switch (status) {
        case 'pending':  return { label: 'en attente', cls: 'status-pending' };
        case 'read':     return { label: 'vu',         cls: 'status-read' };
        case 'replied':  return { label: 'répondu',    cls: 'status-replied' };
        case 'expired':  return { label: 'expiré',     cls: 'status-expired' };
        default:         return null;  // sent, received → no badge
      }
    }

    function initial(name) {
      return (name ?? '?').charAt(0).toUpperCase();
    }

    // Reply-provenance glyph appended to the "répondu" badge: how the peer
    // answered — 📱 from their PWA, 🖥️ tapped on their screen. '' if unknown
    // (older replies / peers that predate the channel field).
    function channelIcon(via) {
      if (via === 'pwa')    return ' <span class="chan" title="répondu depuis le téléphone">📱</span>';
      if (via === 'screen') return ' <span class="chan" title="répondu sur l’écran">🖥️</span>';
      return '';
    }

    function renderMessage(msg, myOwner) {
      const time = timeFmt.format(new Date(msg.createdAt));
      // Direction by typography: A → F means A sent to F. Owners resolve to
      // their current display name (nickname || owner) at render time.
      const fromName = nameFor(msg.direction === 'out' ? myOwner : msg.from);
      const toName   = nameFor(msg.direction === 'out' ? msg.to   : myOwner);
      const fromTitle = fromName ?? '?';
      const toTitle   = toName ?? '?';
      const directionHtml = `<span class="direction" title="${esc(fromTitle)} → ${esc(toTitle)}">`
        + `<span class="full">${esc(fromName ?? '?')}</span><span class="init">${esc(initial(fromName))}</span>`
        + `<span class="arrow">→</span>`
        + `<span class="full">${esc(toName ?? '?')}</span><span class="init">${esc(initial(toName))}</span>`
        + `</span>`;
      const status = statusLabel(msg.status);
      const chan = msg.status === 'replied' ? channelIcon(msg.replyChannel) : '';
      const statusHtml = status
        ? `<span class="status ${status.cls}">${status.label}${chan}</span>`
        : '';
      const replyCtx = (msg.isReply && msg.replyToText)
        ? `<div class="reply-context">en réponse à «&nbsp;${esc(msg.replyToText)}&nbsp;»</div>`
        : '';
      const optsHtml = (msg.responseOptions && msg.responseOptions.length > 0)
        ? `<div class="msg-options">${msg.responseOptions.map((o) => `<span class="opt">${esc(o.label ?? o)}</span>`).join('')}</div>`
        : '';
      const classes = [
        'msg-card',
        msg.direction === 'out' ? 'msg-out' : 'msg-in',
        msg.status === 'expired' ? 'expired' : '',
        msg.isReply ? 'is-reply' : '',
      ].filter(Boolean).join(' ');
      return `
        <article class="${classes}" data-id="${esc(msg.id)}">
          <div class="msg-meta">
            ${directionHtml}
            <span class="time">${time}</span>
            ${statusHtml}
          </div>
          ${replyCtx}
          <div class="msg-text">${esc(msg.text)}</div>
          ${optsHtml}
        </article>
      `;
    }

    function renderGroups({ groups, owner }) {
      if (!groups || groups.length === 0) {
        mainEl.innerHTML = '<div class="empty">Aucun message pour l’instant.</div>';
        return;
      }
      mainEl.innerHTML = groups.map((g) => `
        <section class="day">
          <h2 class="crema-label">${esc(dayLabel(g.date))}</h2>
          <div class="messages">
            ${g.messages.map((m) => renderMessage(m, owner)).join('')}
          </div>
        </section>
      `).join('');
    }

    async function load() {
      try {
        await loadNames();
        const r = await fetch('/history.json?limit=300');
        const data = await r.json();
        renderGroups(data);
      } catch (err) {
        mainEl.innerHTML = '<div class="empty">Impossible de charger l’historique.</div>';
      }
    }

    load();

    // ===== Live updates =====
    // Two complementary signals from the server:
    //  - msg:status: an existing message's status changed → swap the badge
    //    in place (cheap, no flicker).
    //  - history:new: a new message was inserted in DB → refetch + re-render
    //    (debounced so a burst of inserts only fires one fetch).
    const socket = io();

    let refetchTimer = null;
    function scheduleRefetch() {
      if (refetchTimer) clearTimeout(refetchTimer);
      refetchTimer = setTimeout(() => {
        refetchTimer = null;
        load();
      }, 250);
    }

    socket.on('history:new', scheduleRefetch);

    socket.on('msg:status', ({ id, status, via }) => {
      if (!id || !status) return;
      const card = mainEl.querySelector(`[data-id="${id}"]`);
      if (!card) return;
      const statusEl = card.querySelector('.status');
      if (!statusEl) return;
      // Don't downgrade a terminal state (replied / expired) with 'read'.
      if (status === 'read' && !statusEl.classList.contains('status-pending')) return;
      const next = statusLabel(status);
      if (!next) return;
      statusEl.className = `status ${next.cls}`;
      // label is plain text; channelIcon emits a trusted, fixed span.
      statusEl.innerHTML = next.label + (status === 'replied' ? channelIcon(via) : '');
      // The expired status also greys out the card.
      if (status === 'expired') card.classList.add('expired');
    });
  </script>
  </script>
</body>
</html>
