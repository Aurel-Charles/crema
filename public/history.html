<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#F6F8F4" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Crema" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/svg+xml" href="/icon.svg" />
  <link rel="apple-touch-icon" href="/icon.svg" />
  <title>Crema — Historique</title>
  <link rel="stylesheet" href="/theme.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--crema-bg);
      color: var(--crema-text);
      min-height: 100vh;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    header {
      padding: 24px 20px 0;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .back {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      color: var(--crema-text);
      text-decoration: none;
      border-radius: 12px;
      transition: background 0.15s;
    }
    .back:active { background: var(--crema-stroke-faint); }
    h1 {
      margin: 0;
      font-size: 24px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    main {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* Day headers — signature kerned, sized for hierarchy */
    .day h2 {
      margin: 0 0 10px;
      padding: 0 4px;
      font-size: 13px;
      color: var(--crema-muted);
    }

    .messages {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .msg-card {
      background: var(--crema-surface);
      border: 1px solid var(--crema-stroke-faint);
      border-radius: 14px;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .msg-card.msg-out { border-left: 3px solid var(--crema-text); }
    .msg-card.msg-in  { border-left: 3px solid var(--crema-accent); }
    .msg-card.expired { opacity: 0.6; }

    .msg-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--crema-muted);
      font-variant-numeric: tabular-nums;
    }
    .msg-meta .arrow {
      font-weight: 700;
      color: var(--crema-text);
    }
    .msg-in .msg-meta .arrow { color: var(--crema-accent); }
    .msg-meta .person {
      color: var(--crema-text);
      font-weight: 600;
    }
    .msg-meta .time { color: var(--crema-muted); }
    .msg-meta .status {
      margin-left: auto;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 999px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      font-weight: 600;
    }
    .status-pending  { background: var(--crema-stroke-faint); color: var(--crema-muted); }
    .status-read     { background: rgba(168, 196, 156, 0.22); color: #8a5a14; }
    .status-replied  { background: #e3f3e1; color: #2d7a3a; }
    .status-expired  { background: var(--crema-danger-bg); color: var(--crema-danger); }

    .reply-context {
      font-size: 13px;
      color: var(--crema-muted);
      font-style: italic;
      line-height: 1.4;
      padding-left: 10px;
      border-left: 2px solid var(--crema-stroke-faint);
    }

    .msg-text {
      font-size: 16px;
      line-height: 1.4;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .msg-card.msg-in.is-reply .msg-text::before {
      content: "↩";
      color: var(--crema-muted);
      margin-right: 6px;
      font-weight: 400;
    }
    .msg-card.msg-out.is-reply .msg-text::before {
      content: "↩";
      color: var(--crema-muted);
      margin-right: 6px;
      font-weight: 400;
    }

    .msg-options {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 2px;
    }
    .opt {
      font-size: 11px;
      padding: 3px 8px;
      background: var(--crema-stroke-faint);
      border-radius: 999px;
      color: var(--crema-muted);
    }

    .empty {
      text-align: center;
      padding: 40px 20px;
      color: var(--crema-muted);
      font-size: 14px;
    }

    .loading {
      text-align: center;
      padding: 30px 20px;
      color: var(--crema-muted);
      font-size: 13px;
    }
  </style>
</head>
<body>
  <header>
    <a href="/" class="back" aria-label="Retour">←</a>
    <h1>Historique</h1>
  </header>

  <main id="main">
    <div class="loading">Chargement…</div>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js').catch(() => {});
    }

    const mainEl = document.getElementById('main');

    const timeFmt = new Intl.DateTimeFormat('fr-FR', { hour: '2-digit', minute: '2-digit', hour12: false });
    const dayFmt = new Intl.DateTimeFormat('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });

    function esc(s) {
      return String(s).replace(/[&<>"']/g, (c) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
      }[c]));
    }

    function todayKey() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    }

    function offsetKey(daysAgo) {
      const d = new Date();
      d.setDate(d.getDate() - daysAgo);
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    }

    function dayLabel(dateKey) {
      if (dateKey === todayKey()) return "Aujourd'hui";
      if (dateKey === offsetKey(1)) return 'Hier';
      const [y, m, d] = dateKey.split('-').map(Number);
      const label = dayFmt.format(new Date(y, m - 1, d));
      return label.charAt(0).toUpperCase() + label.slice(1);
    }

    function statusLabel(status) {
      switch (status) {
        case 'pending':  return { label: 'en attente', cls: 'status-pending' };
        case 'read':     return { label: 'vu',         cls: 'status-read' };
        case 'replied':  return { label: 'répondu',    cls: 'status-replied' };
        case 'expired':  return { label: 'expiré',     cls: 'status-expired' };
        default:         return null;  // sent, received → no badge
      }
    }

    function renderMessage(msg, myOwner) {
      const time = timeFmt.format(new Date(msg.createdAt));
      const arrow = msg.direction === 'out' ? '→' : '←';
      const person = msg.direction === 'out' ? (msg.to ?? '?') : msg.from;
      const status = statusLabel(msg.status);
      const statusHtml = status
        ? `<span class="status ${status.cls}">${status.label}</span>`
        : '';
      const replyCtx = (msg.isReply && msg.replyToText)
        ? `<div class="reply-context">en réponse à «&nbsp;${esc(msg.replyToText)}&nbsp;»</div>`
        : '';
      const optsHtml = (msg.responseOptions && msg.responseOptions.length > 0)
        ? `<div class="msg-options">${msg.responseOptions.map((o) => `<span class="opt">${esc(o.label ?? o)}</span>`).join('')}</div>`
        : '';
      const classes = [
        'msg-card',
        msg.direction === 'out' ? 'msg-out' : 'msg-in',
        msg.status === 'expired' ? 'expired' : '',
        msg.isReply ? 'is-reply' : '',
      ].filter(Boolean).join(' ');
      return `
        <article class="${classes}" data-id="${esc(msg.id)}">
          <div class="msg-meta">
            <span class="arrow">${arrow}</span>
            <span class="person">${esc(person)}</span>
            <span class="time">${time}</span>
            ${statusHtml}
          </div>
          ${replyCtx}
          <div class="msg-text">${esc(msg.text)}</div>
          ${optsHtml}
        </article>
      `;
    }

    function renderGroups({ groups, owner }) {
      if (!groups || groups.length === 0) {
        mainEl.innerHTML = '<div class="empty">Aucun message pour l’instant.</div>';
        return;
      }
      mainEl.innerHTML = groups.map((g) => `
        <section class="day">
          <h2 class="crema-label">${esc(dayLabel(g.date))}</h2>
          <div class="messages">
            ${g.messages.map((m) => renderMessage(m, owner)).join('')}
          </div>
        </section>
      `).join('');
    }

    async function load() {
      try {
        const r = await fetch('/history.json?limit=300');
        const data = await r.json();
        renderGroups(data);
      } catch (err) {
        mainEl.innerHTML = '<div class="empty">Impossible de charger l’historique.</div>';
      }
    }

    load();

    // ===== Live updates =====
    // Two complementary signals from the server:
    //  - msg:status: an existing message's status changed → swap the badge
    //    in place (cheap, no flicker).
    //  - history:new: a new message was inserted in DB → refetch + re-render
    //    (debounced so a burst of inserts only fires one fetch).
    const socket = io();

    let refetchTimer = null;
    function scheduleRefetch() {
      if (refetchTimer) clearTimeout(refetchTimer);
      refetchTimer = setTimeout(() => {
        refetchTimer = null;
        load();
      }, 250);
    }

    socket.on('history:new', scheduleRefetch);

    socket.on('msg:status', ({ id, status }) => {
      if (!id || !status) return;
      const card = mainEl.querySelector(`[data-id="${id}"]`);
      if (!card) return;
      const statusEl = card.querySelector('.status');
      if (!statusEl) return;
      // Don't downgrade a terminal state (replied / expired) with 'read'.
      if (status === 'read' && !statusEl.classList.contains('status-pending')) return;
      const next = statusLabel(status);
      if (!next) return;
      statusEl.className = `status ${next.cls}`;
      statusEl.textContent = next.label;
      // The expired status also greys out the card.
      if (status === 'expired') card.classList.add('expired');
    });
  </script>
  </script>
</body>
</html>
