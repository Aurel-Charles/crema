<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Crema — Display</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }

    :root {
      --bg: #1a1410;
      --accent: #f4a65a;
      --text: #f2e4cc;
      --muted: #9c7e54;
      --presence: #87c459;
    }
    body.day {
      --bg: #2a1d14;
      --accent: #ffb870;
      --text: #fff4dd;
      --muted: #c89968;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 32px;
      overflow: hidden;
      cursor: none;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background-color 1.5s ease, color 1.5s ease;
    }

    .topbar {
      position: absolute;
      top: 24px;
      right: 28px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
      pointer-events: none;
    }

    .presence {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: clamp(13px, 1.5vw, 18px);
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.02em;
    }
    .presence .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--presence);
      box-shadow: 0 0 8px var(--presence);
      flex-shrink: 0;
    }
    .presence .name { color: var(--text); font-weight: 600; }

    #screen {
      max-width: 90vw;
      text-align: center;
      line-height: 1.15;
    }

    .idle .clock {
      font-size: clamp(96px, 22vw, 240px);
      font-weight: 200;
      color: var(--accent);
      letter-spacing: -0.04em;
      font-variant-numeric: tabular-nums;
      transition: color 1.5s ease;
    }
    .idle .date {
      font-size: clamp(18px, 2.6vw, 32px);
      color: var(--muted);
      margin-top: 8px;
      text-transform: capitalize;
      font-weight: 400;
      transition: color 1.5s ease;
    }

    .msg .from {
      font-size: clamp(14px, 1.6vw, 20px);
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 24px;
    }
    .msg .text {
      font-size: clamp(38px, 6vw, 64px);
      font-weight: 500;
      color: var(--text);
    }
    .msg .text .reply-prefix {
      color: var(--muted);
      margin-right: 0.4em;
      font-weight: 400;
    }

    #reply-bar {
      position: absolute;
      bottom: 28px;
      right: 28px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
      max-width: 70vw;
    }
    #reply-bar.hidden { display: none; }

    .reply-btn {
      min-height: 56px;
      min-width: 56px;
      padding: 12px 22px;
      font-family: inherit;
      font-size: clamp(18px, 2vw, 22px);
      font-weight: 500;
      color: var(--text);
      background: transparent;
      border: 1.5px solid var(--muted);
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.15s ease, transform 0.05s ease, border-color 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .reply-btn:active { transform: scale(0.96); background: rgba(244, 166, 90, 0.15); }
    .reply-btn:disabled { opacity: 0.4; cursor: default; }
    .reply-btn.sent { border-color: var(--presence); color: var(--presence); }
    .reply-btn.failed { border-color: #c45a45; color: #c45a45; }
  </style>
</head>
<body class="night">
  <header class="topbar">
    <div id="presence-list"></div>
  </header>

  <main id="screen"></main>

  <div id="reply-bar" class="hidden"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    // ===== State =====
    const screen = document.getElementById('screen');
    const replyBar = document.getElementById('reply-bar');
    const presenceList = document.getElementById('presence-list');

    const MESSAGE_TTL_MS = 30_000;
    const REPLY_RETURN_DELAY_MS = 1_500;

    const dateFmt = new Intl.DateTimeFormat('fr-FR', {
      weekday: 'long', day: 'numeric', month: 'long',
    });
    const timeFmt = new Intl.DateTimeFormat('fr-FR', {
      hour: '2-digit', minute: '2-digit', hour12: false,
    });

    let mode = 'idle';
    let resetTimer = null;
    let currentMsg = null;     // { fromInstanceId, isReply } while displaying a message
    let replies = [];          // configured quick replies
    const peers = new Map();   // instanceId -> owner

    // ===== Render =====
    function renderIdle() {
      const now = new Date();
      screen.className = 'idle';
      screen.innerHTML = `
        <div class="clock">${timeFmt.format(now)}</div>
        <div class="date">${dateFmt.format(now)}</div>
      `;
    }

    function showIdle() {
      mode = 'idle';
      currentMsg = null;
      hideReplyBar();
      renderIdle();
    }

    function showMessage({ text, from, fromInstanceId, isReply }) {
      mode = 'message';
      currentMsg = { fromInstanceId, isReply };
      const fromLabel = from ? `<div class="from">${escapeHtml(from)}</div>` : '';
      const prefix = isReply ? '<span class="reply-prefix">↩</span>' : '';
      screen.className = 'msg';
      screen.innerHTML = `${fromLabel}<div class="text">${prefix}${escapeHtml(text)}</div>`;
      renderReplyBar();
      if (resetTimer) clearTimeout(resetTimer);
      resetTimer = setTimeout(showIdle, MESSAGE_TTL_MS);
    }

    function renderReplyBar() {
      const canReply = currentMsg && !currentMsg.isReply && currentMsg.fromInstanceId
                       && replies.length > 0;
      if (!canReply) { hideReplyBar(); return; }
      replyBar.classList.remove('hidden');
      replyBar.innerHTML = replies
        .map((r, i) => `<button class="reply-btn" data-i="${i}">${escapeHtml(r.label)}</button>`)
        .join('');
    }

    function hideReplyBar() {
      replyBar.classList.add('hidden');
      replyBar.innerHTML = '';
    }

    function renderPresence() {
      if (peers.size === 0) { presenceList.innerHTML = ''; return; }
      const seenOwners = new Set();
      const rows = [];
      for (const owner of peers.values()) {
        if (seenOwners.has(owner)) continue;
        seenOwners.add(owner);
        rows.push(`
          <div class="presence">
            <span class="dot"></span>
            <span><span class="name">${escapeHtml(owner)}</span> en ligne</span>
          </div>
        `);
      }
      presenceList.innerHTML = rows.join('');
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (c) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
      }[c]));
    }

    // ===== Reply handling =====
    replyBar.addEventListener('click', async (e) => {
      const btn = e.target.closest('.reply-btn');
      if (!btn || btn.disabled || !currentMsg?.fromInstanceId) return;
      const idx = Number(btn.dataset.i);
      const reply = replies[idx];
      if (!reply) return;

      // Disable all buttons during the send
      for (const b of replyBar.querySelectorAll('.reply-btn')) b.disabled = true;

      try {
        const r = await fetch('/reply', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ to: currentMsg.fromInstanceId, label: reply.label }),
        });
        if (!r.ok) throw new Error('send failed');
        btn.classList.add('sent');
        btn.textContent = '✓ ' + reply.label;
        // Short delay so the user sees the confirmation, then back to idle
        if (resetTimer) clearTimeout(resetTimer);
        resetTimer = setTimeout(showIdle, REPLY_RETURN_DELAY_MS);
      } catch {
        btn.classList.add('failed');
        btn.textContent = '✕ ' + reply.label;
        // Re-enable buttons after a moment so user can retry
        setTimeout(() => {
          for (const b of replyBar.querySelectorAll('.reply-btn')) b.disabled = false;
          btn.classList.remove('failed');
          btn.textContent = reply.label;
        }, 2000);
      }
    });

    // ===== Clock tick =====
    showIdle();
    const msToNextMinute = 60_000 - (Date.now() % 60_000);
    setTimeout(() => {
      if (mode === 'idle') renderIdle();
      setInterval(() => { if (mode === 'idle') renderIdle(); }, 60_000);
    }, msToNextMinute);

    // ===== Day/night theme =====
    let schedule = null;

    async function loadSchedule() {
      try {
        const r = await fetch('/theme-schedule');
        schedule = await r.json();
        applyTheme();
      } catch {}
    }

    function applyTheme() {
      if (!schedule) return;
      const now = new Date();
      const sunrise = new Date(schedule.sunrise);
      const sunset = new Date(schedule.sunset);
      const isDay = now >= sunrise && now < sunset;
      document.body.classList.toggle('day', isDay);
      document.body.classList.toggle('night', !isDay);
    }

    function scheduleMidnightRefresh() {
      const now = new Date();
      const next = new Date(now);
      next.setDate(now.getDate() + 1);
      next.setHours(0, 0, 30, 0);
      setTimeout(async () => {
        await loadSchedule();
        scheduleMidnightRefresh();
      }, next - now);
    }

    loadSchedule();
    setInterval(applyTheme, 60_000);
    scheduleMidnightRefresh();

    // ===== Replies fetch =====
    async function loadReplies() {
      try {
        const r = await fetch('/replies');
        replies = await r.json();
        if (mode === 'message') renderReplyBar();
      } catch {}
    }
    loadReplies();

    // ===== Socket =====
    const socket = io();

    socket.on('peers:init', (list) => {
      peers.clear();
      for (const p of list) peers.set(p.instanceId, p.owner);
      renderPresence();
    });
    socket.on('peer:up', ({ instanceId, owner }) => {
      peers.set(instanceId, owner);
      renderPresence();
    });
    socket.on('peer:down', ({ instanceId }) => {
      peers.delete(instanceId);
      renderPresence();
    });

    socket.on('replies:updated', (list) => {
      replies = list;
      if (mode === 'message') renderReplyBar();
    });

    socket.on('message', (data) => {
      if (data && typeof data.text === 'string' && data.text.trim()) {
        showMessage(data);
      }
    });
  </script>
</body>
</html>
