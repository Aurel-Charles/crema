<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Crema — Display</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1410;
      color: #f2e4cc;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 32px;
      overflow: hidden;
      cursor: none;
    }
    #screen {
      max-width: 90vw;
      text-align: center;
      line-height: 1.2;
      transition: opacity 0.3s ease;
    }
    #screen.idle {
      font-size: clamp(72px, 18vw, 180px);
      font-weight: 300;
      color: #f4a65a;
      letter-spacing: -0.02em;
    }
    #screen.message {
      font-size: clamp(38px, 6vw, 64px);
      font-weight: 500;
      color: #f2e4cc;
    }
  </style>
</head>
<body>
  <div id="screen" class="idle">Prêt</div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const screen = document.getElementById('screen');
    const IDLE_TEXT = 'Prêt';
    const MESSAGE_TTL_MS = 30_000;
    let resetTimer = null;

    function showIdle() {
      screen.className = 'idle';
      screen.textContent = IDLE_TEXT;
    }

    function showMessage(text) {
      screen.className = 'message';
      screen.textContent = text;
      if (resetTimer) clearTimeout(resetTimer);
      resetTimer = setTimeout(showIdle, MESSAGE_TTL_MS);
    }

    const socket = io();
    socket.on('message', ({ text }) => {
      if (typeof text === 'string' && text.trim()) {
        showMessage(text);
      }
    });
  </script>
</body>
</html>
