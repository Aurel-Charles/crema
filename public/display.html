<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Crema — Display</title>
  <link rel="stylesheet" href="/theme.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }

    body {
      font-family: var(--crema-font-sans);
      background: var(--crema-bg);
      color: var(--crema-text);
      height: 100vh;
      padding: 0;
      overflow: hidden;
      cursor: none;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background-color 1.5s ease, color 1.5s ease;
    }

    /* ===== Responsive: 800×480 stage, scaled to fit any viewport =====
     * The whole UI is authored in the Pi's native 800×480 (5:3) coordinate
     * space, then scaled as one block (transform) so it stays pixel-faithful
     * on phone / tablet / desktop. --stage-scale is computed in JS on resize.
     * The warm body gradient fills the letterbox around it. */
    .stage {
      position: relative;
      flex: none;
      width: 800px;
      height: 480px;
      transform: scale(var(--stage-scale, 1));
      transform-origin: center center;
      /* Centers the in-flow #screen.msg; absolutely-positioned children
       * (idle layout, topbar, notif, shortcuts) ignore flex. */
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Top-left controls: sit just right of the vertical crema·aurel
     * watermark (idle-watermark lives at left:18). Row layout: moon, then
     * presence — matches the agreed Mega-Type idle composition. */
    .topbar {
      position: absolute;
      top: 22px;
      left: 48px;
      z-index: 40;
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 14px;
      pointer-events: none;
    }

    .dnd-btn {
      pointer-events: auto;
      position: relative;
      width: 42px;
      height: 42px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      border-radius: 50%;
      color: var(--crema-muted);
      cursor: pointer;
      transition: color 0.2s ease, background 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .dnd-btn:active { background: rgba(232, 137, 110, 0.18); }
    .dnd-btn .moon {
      width: 22px;
      height: 22px;
      transition: fill 0.2s ease, stroke 0.2s ease;
    }
    .dnd-btn.on {
      background: var(--crema-accent);
      color: var(--crema-bg);
      box-shadow: 0 0 14px rgba(232, 137, 110, 0.4);
    }
    .dnd-btn.on .moon {
      fill: var(--crema-bg);
      stroke: var(--crema-bg);
    }
    .presence {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: clamp(13px, 1.5vw, 18px);
      font-weight: 500;
      color: var(--crema-muted);
      letter-spacing: 0.02em;
    }
    .presence .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--crema-presence);
      box-shadow: 0 0 8px var(--crema-presence);
      flex-shrink: 0;
    }
    /* Name wears .crema-label in markup; we only need the color override. */
    .presence .name { color: var(--crema-text); }
    .typing-dots {
      display: inline-block;
      letter-spacing: 1px;
      margin-left: 1px;
    }
    .typing-dots span {
      display: inline-block;
      opacity: 0.3;
      animation: typing-bounce 1.2s infinite ease-in-out;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.15s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes typing-bounce {
      0%, 60%, 100% { opacity: 0.3; }
      30% { opacity: 1; }
    }

    /* Transient toast moved to the top-right (presence now owns top-left). */
    #notif {
      position: absolute;
      top: 24px;
      right: 28px;
      z-index: 45;
      max-width: 45vw;
      padding: 10px 14px;
      font-family: var(--crema-font-mono);
      font-size: clamp(11px, 1.2vw, 14px);
      letter-spacing: 0.04em;
      color: var(--crema-text);
      background: rgba(255, 255, 255, 0.4);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid var(--crema-stroke);
      border-radius: 14px;
      opacity: 0;
      transform: translateX(12px);
      transition: opacity 0.3s ease, transform 0.3s ease;
      pointer-events: none;
    }
    #notif.visible {
      opacity: 1;
      transform: translateX(0);
    }

    #screen {
      max-width: 90vw;
      text-align: center;
      line-height: 1.15;
    }

    /* ===== Mega Type idle (from "01 _ Display idle" canvas) =====
     * Full-bleed composition: huge left-anchored clock, footer stats,
     * left rainbow spine, crema·aurel watermark, corner sun glow.
     * #screen.idle escapes the body flex-center and fills the viewport. */
    #screen.idle {
      position: absolute;
      inset: 0;
      max-width: none;
      text-align: left;
    }

    /* Left rainbow spine — the Currents signature, reduced to a 14px edge.
     * Replaces the bottom rainbow stripe (suppressed in idle below). */
    .idle-spine {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 14px;
      background: linear-gradient(180deg,
        var(--band-2), var(--band-1), var(--band-7), var(--band-6), var(--band-4));
      opacity: 0.9;
    }

    /* Sun glow bleeding off the top-right corner. */
    .idle-glow {
      position: absolute;
      top: -160px;
      right: -160px;
      width: 420px;
      height: 420px;
      border-radius: 50%;
      background: radial-gradient(circle,
        var(--band-2) 0%, var(--band-1) 48%, transparent 70%);
      opacity: 0.5;
      filter: blur(2px);
      pointer-events: none;
    }

    /* Vertical brand/owner watermark on the far-left edge. */
    .idle-watermark {
      position: absolute;
      left: 18px;
      top: 28px;
      writing-mode: vertical-rl;
      text-orientation: mixed;
      font-family: var(--crema-font-mono);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.35em;
      color: var(--crema-text);
      opacity: 0.45;
    }

    /* Transport/server status — vertical watermark at the opposite end of the
     * rainbow spine from crema·<owner> (top → owner, bottom → status). Lives in
     * .stage so it survives #screen re-renders and shows in idle + message
     * modes alike. Empty (hidden) when the broker carries traffic; only speaks
     * up on fallback or full outage. */
    .server-status {
      position: absolute;
      left: 18px;
      bottom: 28px;
      z-index: 41;
      writing-mode: vertical-rl;
      text-orientation: mixed;
      font-family: var(--crema-font-mono);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.35em;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.5s ease, color 0.5s ease;
    }
    .server-status.show { opacity: 0.75; }
    .server-status.fallback { color: var(--crema-attention); }
    .server-status.error { color: var(--crema-danger); }

    .idle-clock {
      position: absolute;
      left: 64px;
      top: 70px;
      font-family: var(--crema-font-serif);
      font-style: normal;
      font-size: 260px;
      font-weight: 400;
      line-height: 0.9;
      color: var(--crema-text);
      letter-spacing: -0.045em;
      font-variant-numeric: tabular-nums;
      transition: color 1.5s ease;
    }

    /* Footer stats row — labels in tracked mono, values in serif. Sits just
     * under the clock; the recipient bar takes the bottom-left. */
    .idle-footer {
      position: absolute;
      left: 64px;
      top: 332px;
      display: flex;
      align-items: flex-end;
      gap: 22px;
    }
    .idle-stat {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }
    #msg-stat {
      flex-direction: row;
      align-items: flex-end;
      gap: 22px;
    }
    #msg-stat[hidden] { display: none; }
    .idle-stat-label {
      font-family: var(--crema-font-mono);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.25em;
      color: var(--crema-muted);
    }
    .idle-stat-value {
      font-family: var(--crema-font-serif);
      font-size: 26px;
      line-height: 1;
      color: var(--crema-text);
      font-variant-numeric: tabular-nums;
    }
    .idle-divider {
      width: 1px;
      align-self: stretch;
      min-height: 40px;
      background: var(--crema-text);
      opacity: 0.28;
    }
    .msg-stat-body {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }
    .msg-count {
      color: var(--crema-accent-deep);
      font-size: 26px;
    }
    .msg-from {
      font-family: var(--crema-font-mono);
      font-size: 11px;
      letter-spacing: 0.1em;
      color: var(--crema-muted);
      margin-left: 6px;
    }

    /* Message mode — "02" Mega Type: full-bleed left-aligned composition,
     * filling the 800×480 stage like the idle screen. */
    #screen.msg {
      position: absolute;
      inset: 0;
      max-width: none;
      text-align: left;
      padding: 0;
    }

    /* Hide idle chrome (DND + presence) while a message owns the top. */
    body.crema-display:has(#screen.msg) .topbar { display: none; }

    /* Kill the old centered-idle sun disc (theme.css #screen.idle::before). */
    #screen.idle::before { content: none; }

    /* Mega Type is clean (no Currents ripple, no dark plinth) — the rainbow
     * signature lives in each screen's left spine. Kill theme.css's
     * viewport-fixed ripple/stripe so they don't show in the letterbox. */
    body.crema-display::before,
    body.crema-display::after { content: none; }

    /* ===== Message furniture: spine / glow / watermark ===== */
    .msg-spine {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 14px;
      background: linear-gradient(180deg,
        var(--band-2), var(--band-1), var(--band-7), var(--band-6), var(--band-4));
      opacity: 0.9;
    }
    .msg-glow {
      position: absolute;
      top: -110px; right: -90px;
      width: 280px; height: 280px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--band-1) 0%, var(--band-7) 50%, transparent 70%);
      opacity: 0.42;
      filter: blur(2px);
      pointer-events: none;
    }
    .msg-watermark {
      position: absolute;
      left: 18px; top: 28px;
      writing-mode: vertical-rl;
      text-orientation: mixed;
      font-family: var(--crema-font-mono);
      font-size: 10px; font-weight: 600;
      letter-spacing: 0.35em;
      color: var(--crema-text);
      opacity: 0.45;
    }

    /* ===== Header row: avatar · SENDER · ago · rule · reply-quote ===== */
    .msg-top {
      position: absolute;
      left: 64px; top: 26px; right: 36px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .msg .avatar {
      width: 32px; height: 32px;
      flex-shrink: 0;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--band-1), var(--band-7));
      display: flex; align-items: center; justify-content: center;
      font-family: var(--crema-font-serif);
      font-weight: 400; font-size: 18px;
      color: #FFFFFF;
      box-shadow: 0 4px 14px -6px rgba(232, 137, 110, 0.6);
    }
    .msg-sender {              /* wears .crema-label (uppercase, tracked) */
      font-size: 13px;
      color: var(--crema-text);
      flex-shrink: 0;
    }
    .msg-ago {
      font-family: var(--crema-font-mono);
      font-size: 10px;
      letter-spacing: 0.13em;
      color: var(--crema-muted);
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
    }
    /* Header rule doubles as the TTL track: a faint full line, with an
     * accent fill that depletes left→right when the message has an expiry
     * (V4). No expiry → just the faint line. */
    .msg-rule {
      flex: 1;
      height: 2px;
      min-width: 16px;
      background: rgba(42, 26, 68, 0.22);
      overflow: hidden;
    }
    .msg-rule-fill {
      width: 100%;
      height: 100%;
      background: var(--crema-accent);
      transform-origin: left center;
      transform: scaleX(1);
    }
    .msg-quote {
      flex-shrink: 1;
      min-width: 0;
      font-family: var(--crema-font-serif);
      font-style: italic;
      font-size: 13px;
      color: var(--crema-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ===== Message body — vertically centered band, auto-fitted text ===== */
    .msg-body {
      position: absolute;
      left: 60px; right: 36px;
      top: 78px; bottom: 92px;
      display: flex;
      align-items: center;
      overflow: hidden;
    }
    .msg-text {
      width: 100%;
      font-family: var(--crema-font-serif);
      font-weight: 400;
      letter-spacing: -0.03em;
      line-height: 0.98;
      color: var(--crema-text);
      font-size: 96px;          /* JS auto-fit overrides this */
      opacity: 0;               /* revealed by .run — avoids pre-anim flash */
    }
    .msg.run .msg-text { opacity: 1; }
    .msg-text .word {
      display: inline-block;
      white-space: pre;         /* keep the trailing space tokens */
    }
    .msg-text .word.accent { color: var(--crema-accent-deep); }
    .msg.run .msg-text .word {
      animation: word-in 460ms cubic-bezier(0.2, 0.7, 0.2, 1) both;
    }
    @keyframes word-in {
      from { opacity: 0; transform: translateY(0.28em); }
      to   { opacity: 1; transform: none; }
    }

    /* ===== Footer: "↓ réponds" hint + reply buttons (bottom row) ===== */
    .msg-foot {
      position: absolute;
      left: 60px; right: 36px;
      bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .msg-hint {
      flex-shrink: 0;
      font-family: var(--crema-font-mono);
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.25em;
      color: var(--crema-muted);
      opacity: 0;
    }
    .msg.run .msg-hint { animation: word-in 400ms ease both; }

    .reply-bar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: flex-end;
      margin: 0;
    }
    .reply-btn {
      min-height: 48px;
      min-width: 48px;
      padding: 9px 22px;
      font-family: var(--crema-font-serif);
      font-size: 21px;
      font-weight: 400;
      color: var(--crema-accent);
      background: rgba(232, 137, 110, 0.1);
      border: 1.5px solid rgba(232, 137, 110, 0.4);
      border-radius: 999px;
      cursor: pointer;
      opacity: 0;
      transition: background 0.15s ease, transform 0.05s ease, border-color 0.15s ease, color 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .msg.run .reply-btn {
      animation: word-in 420ms cubic-bezier(0.2, 0.7, 0.2, 1) both;
    }
    /* Solid band fill (per the mock) — overrides theme.css's 14% tint while
     * keeping its per-band border / white text / glow. */
    body.crema-display .reply-btn {
      background: var(--rb, var(--crema-accent));
    }
    .reply-btn:active { transform: scale(0.96); }
    .reply-btn:disabled { cursor: default; }
    .reply-btn.sent {
      background: var(--crema-accent);
      border-color: var(--crema-accent);
      color: var(--crema-accent-ink);
    }
    .reply-btn.failed {
      background: rgba(179, 38, 30, 0.15);
      border-color: var(--crema-danger);
      color: var(--crema-danger);
    }

    /* Accessibility / safety net: no motion → everything visible at once. */
    @media (prefers-reduced-motion: reduce) {
      .msg-text, .msg-text .word, .msg-hint, .reply-btn {
        opacity: 1 !important;
        animation: none !important;
        transform: none !important;
      }
    }

    /* ===== Message exit — mirror of the entrance: elements fade + sink
     * down (the reverse of word-in's rise), in the same staggered cascade.
     * #screen.exiting (id) keeps it ahead of the entrance .run rules. ===== */
    #screen.exiting .msg-top,
    #screen.exiting .msg-text .word,
    #screen.exiting .msg-hint,
    #screen.exiting .reply-btn {
      animation: msg-out 300ms cubic-bezier(0.4, 0, 0.8, 0.4) both;
    }
    @keyframes msg-out {
      to { opacity: 0; transform: translateY(0.3em); }
    }
    @media (prefers-reduced-motion: reduce) {
      #screen.exiting .msg-top,
      #screen.exiting .msg-hint,
      #screen.exiting .reply-btn,
      #screen.exiting .msg-text .word { animation: none !important; opacity: 0 !important; }
    }

    /* Shortcuts (V5) — grille 2 colonnes ancrée sur le bord droit, sous le
     * corner glow, pour dégager l'horloge à gauche. Auto-flow : 4 raccourcis
     * → 2×2, jusqu'à 8 → 2×4. La scène scale en bloc, donc un écran plus petit
     * conserve les 2 colonnes (juste réduites). */
    #shortcuts-bar {
      position: absolute;
      top: 128px;
      right: 30px;
      z-index: 40;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      width: 232px;
    }
    #shortcuts-bar:empty { display: none; }
    .shortcut-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 11px 12px;
      min-height: 72px;
      font-family: inherit;
      background: rgba(232, 137, 110, 0.08);
      border: 1.5px solid rgba(232, 137, 110, 0.35);
      border-radius: 18px;
      cursor: pointer;
      transition: background 0.15s, transform 0.05s, border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
      color: var(--crema-text);
    }
    .shortcut-btn:active {
      transform: scale(0.96);
      background: rgba(232, 137, 110, 0.22);
    }
    .shortcut-btn:disabled {
      opacity: 0.32;
      cursor: default;
    }
    .shortcut-btn .icon {
      font-size: 26px;
      line-height: 1;
    }
    .shortcut-btn .lbl {
      font-size: 13px;
      font-weight: 500;
      color: var(--crema-text);
      max-width: 110px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .shortcut-btn.sent {
      background: rgba(232, 137, 110, 0.18);
      border-color: var(--crema-presence);
    }
    .shortcut-btn.failed {
      background: rgba(179, 38, 30, 0.18);
      border-color: var(--crema-danger);
    }

    /* Global recipient bar — fixed in idle, shows who "global" shortcuts go to. */
    #dest-bar {
      position: absolute;
      left: 64px;
      bottom: 28px;
      z-index: 40;
      display: none;
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
    }
    #dest-bar.show { display: flex; }
    #dest-bar .db-line {
      display: flex;
      align-items: baseline;
      gap: 9px;
      font-size: 20px;
    }
    #dest-bar .db-label { color: var(--crema-muted); }
    #dest-bar .db-name {
      color: var(--crema-accent);
      font-weight: 600;
      max-width: 240px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    #dest-bar .db-name.none { color: var(--crema-muted); font-weight: 400; font-style: italic; }
    #dest-bar #dest-change {
      font-family: inherit;
      font-size: 14px;
      color: var(--crema-text);
      background: rgba(232, 137, 110, 0.08);
      border: 1.5px solid rgba(232, 137, 110, 0.35);
      border-radius: 14px;
      padding: 7px 16px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s, transform 0.05s;
    }
    #dest-bar #dest-change:active { transform: scale(0.96); background: rgba(232, 137, 110, 0.22); }

    /* Recipient picker modal (opened by "Changer"). */
    #target-picker {
      position: absolute;
      inset: 0;
      z-index: 60;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(10, 8, 6, 0.78);
      -webkit-backdrop-filter: blur(3px);
      backdrop-filter: blur(3px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s;
    }
    #target-picker.open { opacity: 1; pointer-events: auto; }
    .tp-card {
      background: var(--crema-bg);
      border: 1.5px solid rgba(232, 137, 110, 0.35);
      border-radius: 24px;
      padding: 26px 32px 30px;
      max-width: 600px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.6);
      transform: scale(0.94);
      transition: transform 0.18s;
    }
    #target-picker.open .tp-card { transform: scale(1); }
    .tp-title {
      font-size: 22px;
      color: var(--crema-text);
      text-align: center;
    }
    .tp-tiles {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 22px;
    }
    .tp-empty {
      color: var(--crema-muted);
      font-size: 15px;
      margin-top: 18px;
    }
    .tp-tile {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 9px;
      min-width: 130px;
      padding: 20px 18px;
      font-family: inherit;
      color: var(--crema-text);
      background: rgba(232, 137, 110, 0.08);
      border: 1.5px solid rgba(232, 137, 110, 0.35);
      border-radius: 18px;
      cursor: pointer;
      transition: background 0.15s, transform 0.05s, border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .tp-tile:active { transform: scale(0.96); background: rgba(232, 137, 110, 0.22); }
    .tp-tile.selected {
      border-color: var(--crema-accent);
      background: rgba(232, 137, 110, 0.22);
    }
    .tp-tile .tp-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--crema-presence);
      box-shadow: 0 0 8px var(--crema-presence);
    }
    .tp-tile .tp-name { font-size: 19px; font-weight: 500; }
    .tp-valider {
      display: block;
      margin: 26px auto 0;
      font-family: inherit;
      font-size: 17px;
      font-weight: 600;
      color: var(--crema-bg);
      background: var(--crema-accent);
      border: none;
      border-radius: 16px;
      padding: 12px 40px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.05s, opacity 0.15s;
    }
    .tp-valider:active { transform: scale(0.97); }
    .tp-valider:disabled { opacity: 0.35; cursor: default; }

    /* Pinned-shortcut destination label, under the button text. */
    .shortcut-btn .dest {
      font-size: 10px;
      color: var(--crema-muted);
      max-width: 110px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ===== Small-screen profile (body.screen-sm, via ?screen=sm) =====
     * Dedicated composition for physically tiny panels (pi-desk's 3.5"):
     * same 800×480 coordinate space, but controls enlarged and decorative
     * density dropped so every tap target clears ~9 mm. The default layout
     * (no class) is untouched, so 7" / tablet / desktop keep their refined
     * look. Tune freely on-device — these are starting proportions. */

    /* — Idle — clock kept prominent but trimmed to free room below. */
    body.screen-sm .idle-clock { font-size: 200px; top: 52px; left: 56px; }
    body.screen-sm .idle-footer { top: 296px; left: 56px; gap: 18px; }
    body.screen-sm .idle-stat-value { font-size: 32px; }
    body.screen-sm .idle-stat-label { font-size: 12px; }
    /* Held-messages stat is noise on a small screen — drop it. */
    body.screen-sm #msg-stat { display: none !important; }

    /* — Presence + DND — bigger, easier to read/tap. */
    body.screen-sm .topbar { top: 20px; left: 52px; gap: 18px; }
    body.screen-sm .presence { font-size: 22px; }
    body.screen-sm .presence .dot { width: 12px; height: 12px; }
    body.screen-sm .dnd-btn { width: 56px; height: 56px; }
    body.screen-sm .dnd-btn .moon { width: 28px; height: 28px; }

    /* — Shortcuts — the primary idle action: chunky, readable. */
    body.screen-sm #shortcuts-bar { top: 116px; right: 26px; width: 300px; gap: 16px; }
    body.screen-sm .shortcut-btn {
      min-height: 104px; padding: 14px 12px; gap: 10px;
      border-width: 2px; border-radius: 22px;
    }
    body.screen-sm .shortcut-btn .icon { font-size: 38px; }
    body.screen-sm .shortcut-btn .lbl { font-size: 19px; max-width: 132px; }
    body.screen-sm .shortcut-btn .dest { font-size: 13px; max-width: 132px; }

    /* — Message — more body room, hint dropped, replies big and centered. */
    body.screen-sm .msg-top { left: 48px; right: 32px; }
    body.screen-sm .msg-body { left: 48px; right: 48px; top: 68px; bottom: 150px; }
    body.screen-sm .msg-foot { left: 48px; right: 48px; bottom: 24px; justify-content: center; }
    body.screen-sm .msg-hint { display: none; }
    body.screen-sm .reply-bar { width: 100%; justify-content: center; gap: 12px; }
    body.screen-sm .reply-btn {
      min-height: 60px; font-size: 26px; padding: 10px 26px; border-width: 2px;
    }

    /* — Recipient bar + picker — keep choices tappable. */
    body.screen-sm #dest-bar { left: 56px; bottom: 22px; gap: 14px; }
    body.screen-sm #dest-bar .db-line { font-size: 24px; }
    body.screen-sm #dest-bar #dest-change { font-size: 19px; padding: 12px 26px; }
    body.screen-sm .tp-tile { min-width: 150px; padding: 26px 22px; }
    body.screen-sm .tp-tile .tp-name { font-size: 24px; }
    body.screen-sm .tp-valider { font-size: 22px; padding: 16px 48px; }

  </style>
</head>
<body class="crema-display night">
  <div class="stage">
  <header class="topbar">
    <button id="dnd-btn" class="dnd-btn" type="button" aria-label="Ne pas déranger">
      <svg class="moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
      </svg>
    </button>
    <div id="presence-list"></div>
  </header>

  <div id="notif"></div>

  <main id="screen"></main>

  <div id="server-status" class="server-status"></div>

  <footer id="shortcuts-bar"></footer>

  <!-- Global recipient bar (idle only) -->
  <div id="dest-bar">
    <div class="db-line">
      <span class="db-label">Destinataire :</span>
      <span class="db-name" id="dest-name">—</span>
    </div>
    <button id="dest-change" type="button">Changer</button>
  </div>

  <!-- Recipient picker (opened by "Changer") -->
  <div id="target-picker">
    <div class="tp-card">
      <div class="tp-title">Destinataire ?</div>
      <div class="tp-tiles" id="tp-tiles"></div>
      <button class="tp-valider" id="tp-valider" type="button">Valider</button>
    </div>
  </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    // ===== Screen profile =====
    // Physically tiny panels (e.g. pi-desk's 3.5" Waveshare, 800×480 logical
    // but ~75 mm wide) need larger touch targets. The whole UI auto-fits the
    // viewport, so a zoom is a no-op — instead `?screen=sm` re-composes the
    // same 800×480 stage with bigger, sparser controls (see body.screen-sm
    // CSS). Set per-Pi via start-display.sh (CREMA_SCREEN / data/screen-profile);
    // no param = the default 7"/tablet/desktop layout, untouched.
    const SCREEN_PROFILE = new URLSearchParams(location.search).get('screen') || '';
    if (SCREEN_PROFILE) document.body.classList.add('screen-' + SCREEN_PROFILE);

    // ===== Elements =====
    const screen = document.getElementById('screen');
    const presenceList = document.getElementById('presence-list');
    const notifEl = document.getElementById('notif');
    const shortcutsBar = document.getElementById('shortcuts-bar');
    const dndBtn = document.getElementById('dnd-btn');
    const targetPicker = document.getElementById('target-picker');
    const tpTiles = document.getElementById('tp-tiles');
    const tpValider = document.getElementById('tp-valider');
    const destBar = document.getElementById('dest-bar');
    const destNameEl = document.getElementById('dest-name');
    const destChangeBtn = document.getElementById('dest-change');
    const serverStatusEl = document.getElementById('server-status');
    let OWNER_NAME = '';      // this Pi's owner (immutable routing identity)
    let SELF_NICKNAME = '';   // this Pi's display nickname (V7.1), may be empty

    // Effective display name = nickname || owner, everywhere a name is shown.
    function selfName() { return SELF_NICKNAME || OWNER_NAME; }
    function displayName(p) { return (p && (p.nickname || p.owner)) || ''; }
    // Resolve an owner to its current display name from the live peer map.
    // Used at *render* time so a renamed peer never rewrites past messages.
    function resolveOwnerName(owner) {
      if (owner === OWNER_NAME) return selfName();
      for (const p of peers.values()) if (p.owner === owner) return p.nickname || p.owner;
      return owner;
    }

    // ===== Responsive stage scaling =====
    // Scale the 800×480 stage to fit the viewport (contain), so the whole
    // composition stays proportional on phone / tablet / desktop.
    const STAGE_W = 800;
    const STAGE_H = 480;
    function fitStage() {
      const scale = Math.min(window.innerWidth / STAGE_W, window.innerHeight / STAGE_H);
      document.documentElement.style.setProperty('--stage-scale', scale);
    }
    fitStage();
    window.addEventListener('resize', fitStage);

    const DEFAULT_DISPLAY_MS = 30_000;
    const REPLY_DISPLAY_MS = 10_000;
    const MIN_DISPLAY_MS = 2_000;
    const REPLY_RETURN_DELAY_MS = 1_500;
    const NOTIF_VISIBLE_MS = 10_000;
    const REPLY_CONTEXT_MAX_CHARS = 60;
    const QUEUE_CAP = 5;
    const QUEUE_DRAIN_DELAY_MS = 600;
    const NOTIF_PREVIEW_MAX_CHARS = 36;

    const weekdayFmt = new Intl.DateTimeFormat('fr-FR', { weekday: 'long' });
    const timeFmt = new Intl.DateTimeFormat('fr-FR', {
      hour: '2-digit', minute: '2-digit', hour12: false,
    });
    // Compact footer date — "lundi 18.05" per the Mega Type canvas.
    function formatDateCompact(d) {
      const dd = String(d.getDate()).padStart(2, '0');
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      return `${weekdayFmt.format(d)} ${dd}.${mm}`;
    }

    // ===== State =====
    let mode = 'idle';
    let resetTimer = null;
    // True while THIS screen is handling its own reply tap (between the tap and
    // the return to idle). Lets the msg:answered signal ignore our own reply —
    // we already show the ✓ and exit animation; only PWA-sent replies dismiss us.
    let selfReplying = false;
    let notifTimer = null;
    let currentMsg = null;
    let replies = [];
    let shortcuts = [];
    let currentTarget = '';  // global recipient (owner), persisted server-side
    const peers = new Map();
    let brokerState = null; // last transport:health broker state
    let dndEnabled = false;
    const messageQueue = [];
    const typingOwners = new Map(); // owner → auto-clear timeout id

    // ===== Time formatting =====
    // Compact "ago" for the message header — "12s" / "5min" / "2h".
    function formatAgoShort(ms) {
      const s = Math.max(0, Math.floor(ms / 1000));
      if (s < 60) return `${s}s`;
      const m = Math.floor(s / 60);
      if (m < 60) return `${m}min`;
      return `${Math.floor(m / 60)}h`;
    }

    // Word-cascade tuning. Each token keeps its trailing space so spacing
    // survives the split; stagger is capped so long messages don't crawl.
    const WORD_STAGGER_MS = 55;
    function splitWords(text) {
      return text.match(/\S+\s*/g) || [];
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (c) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
      }[c]));
    }

    function truncate(s, max) {
      return s.length > max ? s.slice(0, max - 1).trimEnd() + '…' : s;
    }

    // ===== Render =====
    function renderIdle() {
      const now = new Date();
      screen.className = 'idle';
      screen.innerHTML = `
        <div class="idle-spine"></div>
        <div class="idle-glow"></div>
        <div class="idle-watermark">crema · ${escapeHtml(selfName().toLowerCase())}</div>
        <div class="idle-clock">${timeFmt.format(now)}</div>
        <footer class="idle-footer">
          <div class="idle-stat">
            <span class="idle-stat-value">${escapeHtml(formatDateCompact(now))}</span>
          </div>
          <div class="idle-stat" id="msg-stat" hidden>
            <span class="idle-divider"></span>
            <div class="msg-stat-body">
              <span class="idle-stat-label">messages</span>
              <span class="idle-stat-value"><span class="msg-count">0</span><span class="msg-from"></span></span>
            </div>
          </div>
        </footer>
      `;
      updateMsgStat();
    }

    function showIdle() {
      mode = 'idle';
      currentMsg = null;
      selfReplying = false;
      if (resetTimer) { clearTimeout(resetTimer); resetTimer = null; }
      renderIdle();
      renderShortcuts();
      renderDestBar();
      maybeDrainNext();
    }

    function showMessage(data) {
      mode = 'message';
      renderDestBar();  // hides the global recipient bar while a message shows
      // Use arrivedAt if set (message was queued), else stamp now.
      // This keeps the "il y a Xs" subtitle honest for drained messages.
      const receivedAt = data.arrivedAt ?? Date.now();
      const expiresAtMs = data.expiresAt ? Date.parse(data.expiresAt) : null;
      currentMsg = { ...data, receivedAt, expiresAtMs };
      renderMessage();
      renderShortcuts(); // will hide while in message mode

      if (resetTimer) clearTimeout(resetTimer);
      const ttl = expiresAtMs
        ? Math.max(MIN_DISPLAY_MS, expiresAtMs - Date.now())
        : (data.isReply ? REPLY_DISPLAY_MS : DEFAULT_DISPLAY_MS);
      resetTimer = setTimeout(leaveMessage, ttl);

      if (expiresAtMs) startProgressAnimation(ttl);

      // Tell the original sender we just displayed their message (V6.1).
      // Replies don't carry an id over the wire, skip them.
      if (data.id && data.fromInstanceId && !data.isReply) {
        socket.emit('msg:read', { id: data.id, fromInstanceId: data.fromInstanceId });
      }
    }

    function renderMessage() {
      if (!currentMsg) return;
      const { text, from, isReply, replyToText } = currentMsg;

      // Resolve the sender's display name from the live peer map (nickname ||
      // owner). `from` on the wire stays the owner — routing identity intact.
      const fromName = from ? resolveOwnerName(from) : '';
      const initial = fromName ? escapeHtml(fromName.charAt(0).toUpperCase()) : '';
      const avatar = initial ? `<div class="avatar">${initial}</div>` : '';
      const sender = fromName ? `<div class="msg-sender crema-label">${escapeHtml(fromName)}</div>` : '';
      const ago = `<div class="msg-ago">· ${escapeHtml(formatAgoShort(Date.now() - currentMsg.receivedAt))} ·</div>`;
      const quote = (isReply && replyToText)
        ? `<div class="msg-quote">«&nbsp;${escapeHtml(truncate(replyToText, REPLY_CONTEXT_MAX_CHARS))}&nbsp;»</div>`
        : '';
      // The header rule carries the TTL bar (depletes) when there's an expiry.
      const rule = currentMsg.expiresAtMs
        ? '<div class="msg-rule"><div class="msg-rule-fill"></div></div>'
        : '<div class="msg-rule"></div>';
      const header = `<header class="msg-top">${avatar}${sender}${ago}${rule}${quote}</header>`;

      // Word-by-word cascade. Accent the last word in pink only when the
      // message is a question/exclamation (decision: accent on ?/!).
      const tokens = splitWords(text);
      const accentLast = /[?!]\s*$/.test(text);
      const stagger = Math.min(WORD_STAGGER_MS, 1400 / Math.max(1, tokens.length));
      const wordsHtml = tokens.map((tok, i) => {
        const cls = (accentLast && i === tokens.length - 1) ? 'word accent' : 'word';
        return `<span class="${cls}" style="animation-delay:${Math.round(i * stagger)}ms">${escapeHtml(tok)}</span>`;
      }).join('');
      const body = `<div class="msg-body"><div class="msg-text">${wordsHtml}</div></div>`;

      const replyStart = Math.round(tokens.length * stagger) + 200;
      const bar = replyBarHtml(replyStart);
      const hint = bar
        ? `<div class="msg-hint" style="animation-delay:${replyStart}ms">↓ réponds</div>`
        : '';
      const foot = `<footer class="msg-foot">${hint}${bar}</footer>`;

      const furniture =
        '<div class="msg-spine"></div><div class="msg-glow"></div>' +
        '<div class="msg-watermark">crema · message</div>';

      screen.className = 'msg';
      screen.innerHTML = `${furniture}${header}${body}${foot}`;

      fitMessageText();
      if (document.fonts && document.fonts.ready) {
        // Re-fit once the serif web font is in (first message may measure
        // against the fallback metrics).
        document.fonts.ready.then(() => { if (mode === 'message') fitMessageText(); });
      }
      // Run the cascade on the next frame, after the hidden initial state paints.
      requestAnimationFrame(() => requestAnimationFrame(() => {
        if (mode === 'message') screen.classList.add('run');
      }));
    }

    // Binary-search the largest font size that keeps the message inside its
    // body box (measured in unscaled stage px — the stage transform doesn't
    // affect layout metrics, so this holds at any --stage-scale).
    function fitMessageText() {
      const el = screen.querySelector('.msg-text');
      const box = el && el.closest('.msg-body');
      if (!el || !box) return;
      const maxW = box.clientWidth;
      const maxH = box.clientHeight;
      let lo = 32, hi = 132, best = lo;
      for (let i = 0; i < 9; i++) {
        const mid = (lo + hi) / 2;
        el.style.fontSize = mid + 'px';
        if (el.scrollWidth <= maxW + 0.5 && el.scrollHeight <= maxH + 0.5) {
          best = mid; lo = mid;
        } else {
          hi = mid;
        }
      }
      el.style.fontSize = Math.floor(best) + 'px';
    }

    function refreshAgoInPlace() {
      if (mode !== 'message' || !currentMsg) return;
      const el = screen.querySelector('.msg-ago');
      if (el) el.textContent = `· ${formatAgoShort(Date.now() - currentMsg.receivedAt)} ·`;
    }

    function activeReplyItems() {
      if (!currentMsg) return [];
      const opts = currentMsg.responseOptions;
      return (opts && opts.length > 0) ? opts : replies;
    }

    function replyBarHtml(startMs = 0) {
      if (!currentMsg) return '';
      const { fromInstanceId, isReply } = currentMsg;
      if (isReply || !fromInstanceId) return '';
      const items = activeReplyItems();
      if (items.length === 0) return '';
      const buttons = items
        .map((r, i) => `<button class="reply-btn" data-i="${i}" style="animation-delay:${startMs + i * 80}ms">${escapeHtml(r.label)}</button>`)
        .join('');
      return `<div class="reply-bar">${buttons}</div>`;
    }

    function startProgressAnimation(durationMs) {
      const fill = screen.querySelector('.msg-rule-fill');
      if (!fill) return;
      // Reset to full, force reflow, then deplete to empty over the TTL.
      fill.style.transition = 'none';
      fill.style.transform = 'scaleX(1)';
      void fill.offsetHeight;
      fill.style.transition = `transform ${durationMs}ms linear`;
      fill.style.transform = 'scaleX(0)';
    }

    // ===== Message exit animation =====
    // Mirror of the entrance: the pieces fade + sink out in a staggered
    // cascade (the reverse of word-in), then we render idle. Used for every
    // message→idle transition.
    function leaveMessage() {
      if (mode !== 'message') { showIdle(); return; }
      mode = 'leaving';
      if (resetTimer) { clearTimeout(resetTimer); resetTimer = null; }

      // Reduced motion: skip the cascade, go idle promptly.
      if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
        screen.classList.add('exiting');
        resetTimer = setTimeout(showIdle, 120);
        return;
      }

      const setDelay = (el, ms) => { if (el) el.style.animationDelay = ms + 'ms'; };

      // Mirror the entrance: words sink + fade out left→right, then the hint
      // and reply buttons follow — same cascade as word-in, reversed motion.
      setDelay(screen.querySelector('.msg-top'), 0);
      const words = screen.querySelectorAll('.msg-text .word');
      const stag = Math.min(26, 500 / Math.max(1, words.length));
      let lastWord = 0;
      words.forEach((w, i) => {
        const d = Math.round(i * stag);
        w.style.animationDelay = d + 'ms';
        lastWord = Math.max(lastWord, d);
      });
      const tail = lastWord + 50;
      setDelay(screen.querySelector('.msg-hint'), tail);
      screen.querySelectorAll('.reply-btn').forEach((b) => setDelay(b, tail));

      screen.classList.add('exiting');
      resetTimer = setTimeout(showIdle, tail + 300 + 40);
    }

    function renderPresence() {
      if (peers.size === 0) { presenceList.innerHTML = ''; return; }
      const seenOwners = new Set();
      const rows = [];
      for (const p of peers.values()) {
        if (seenOwners.has(p.owner)) continue;
        seenOwners.add(p.owner);
        // Typing is keyed by owner (the wire identity); the name shown is the
        // nickname when set.
        const statusHtml = typingOwners.has(p.owner)
          ? `écrit<span class="typing-dots"><span>.</span><span>.</span><span>.</span></span>`
          : 'en ligne';
        rows.push(`
          <div class="presence">
            <span class="dot"></span>
            <span><span class="name crema-label">${escapeHtml(p.nickname || p.owner)}</span> ${statusHtml}</span>
          </div>
        `);
      }
      presenceList.innerHTML = rows.join('');
    }

    function isOwnerOnline(owner) {
      for (const p of peers.values()) if (p.owner === owner) return true;
      return false;
    }

    // Distinct online owners (dedup multi-instance same owner), used by the
    // recipient picker to decide whether a target choice is needed.
    function onlineOwners() {
      const seen = new Set();
      const out = [];
      for (const p of peers.values()) {
        if (seen.has(p.owner)) continue;
        seen.add(p.owner);
        out.push({ owner: p.owner, nickname: p.nickname || '' });
      }
      return out;
    }

    // Server/transport status watermark. Silent when the broker carries
    // traffic; on fallback it names the path, on full outage it warns.
    //   broker connected      → nothing (nominal)
    //   broker down + peer up  → "p2p · direct" (fallback working)
    //   broker down + no peer  → "hors-ligne"  (nothing reachable)
    function renderServerStatus() {
      if (!serverStatusEl) return;
      let text = '', cls = '';
      if (brokerState === 'connected') {
        // nominal — stay silent
      } else if (peers.size > 0) {
        text = 'p2p · direct'; cls = 'fallback';
      } else if (brokerState) {
        text = 'hors-ligne'; cls = 'error';
      }
      serverStatusEl.textContent = text;
      serverStatusEl.className = 'server-status' + (text ? ` show ${cls}` : '');
    }

    // The recipient a shortcut would actually reach: its pinned owner, or the
    // current global target for global shortcuts. '' = nothing reachable.
    function shortcutTarget(s) {
      return s.targetOwner || effectiveTarget();
    }

    function renderShortcuts() {
      if (mode !== 'idle' || shortcuts.length === 0) {
        shortcutsBar.innerHTML = '';
        return;
      }
      shortcutsBar.innerHTML = shortcuts.map((s, i) => {
        const dest = shortcutTarget(s);
        const online = dest && isOwnerOnline(dest);
        const iconHtml = s.icon ? `<span class="icon">${escapeHtml(s.icon)}</span>` : '';
        // Pinned shortcuts carry their destination as a label under the text;
        // global ones follow the recipient bar, so no per-button label.
        const destHtml = s.targetOwner
          ? `<span class="dest">→ ${escapeHtml(resolveOwnerName(s.targetOwner))}</span>`
          : '';
        return `
          <button class="shortcut-btn" data-i="${i}" ${online ? '' : 'disabled'}>
            ${iconHtml}
            <span class="lbl">${escapeHtml(s.label)}</span>
            ${destHtml}
          </button>
        `;
      }).join('');
    }

    // Global recipient bar. Effective target = the explicit choice when online,
    // else a sole online peer (zero-friction 2-Pi case), else none.
    function effectiveTarget() {
      if (currentTarget && isOwnerOnline(currentTarget)) return currentTarget;
      const owners = onlineOwners();
      return owners.length === 1 ? owners[0].owner : '';
    }

    function renderDestBar() {
      if (mode !== 'idle') { destBar.classList.remove('show'); return; }
      const eff = effectiveTarget();
      if (eff) {
        destNameEl.textContent = resolveOwnerName(eff);
        destNameEl.classList.remove('none');
      } else {
        destNameEl.textContent = 'à choisir';
        destNameEl.classList.add('none');
      }
      destBar.classList.add('show');
    }

    function showNotif(text) {
      notifEl.textContent = text;
      notifEl.classList.add('visible');
      if (notifTimer) clearTimeout(notifTimer);
      notifTimer = setTimeout(() => notifEl.classList.remove('visible'), NOTIF_VISIBLE_MS);
    }

    // ===== DND + message queue =====
    function updateDndUI() {
      dndBtn.classList.toggle('on', dndEnabled);
    }

    // Footer "messages · NN · de flo" stat — live count of held messages
    // (queued under DND or while another is on screen). Only exists in the
    // idle DOM, so this is a no-op in message mode; renderIdle re-syncs it.
    function updateMsgStat() {
      const stat = document.getElementById('msg-stat');
      if (!stat) return;
      const n = messageQueue.length;
      if (n === 0) { stat.hidden = true; return; }
      stat.hidden = false;
      stat.querySelector('.msg-count').textContent = String(n).padStart(2, '0');
      const last = messageQueue[messageQueue.length - 1];
      const from = last && last.from ? last.from : '';
      stat.querySelector('.msg-from').textContent = from ? ` de ${from}` : '';
    }

    function queueIncoming(data) {
      if (messageQueue.length >= QUEUE_CAP) messageQueue.shift();
      messageQueue.push(data);
      updateMsgStat();
      const sender = data.from ? `${data.from} · ` : '';
      const ts = timeFmt.format(new Date(data.arrivedAt));
      showNotif(`${sender}${ts} · ${truncate(data.text, NOTIF_PREVIEW_MAX_CHARS)}`);
    }

    function maybeDrainNext() {
      if (messageQueue.length === 0 || dndEnabled || mode !== 'idle') return;
      const next = messageQueue.shift();
      updateMsgStat();
      setTimeout(() => {
        if (mode === 'idle' && !dndEnabled) showMessage(next);
      }, QUEUE_DRAIN_DELAY_MS);
    }

    async function toggleDnd() {
      const next = !dndEnabled;
      try {
        const r = await fetch('/dnd', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ enabled: next }),
        });
        if (!r.ok) throw new Error();
        // Optimistic flip — dnd:updated will reconfirm shortly.
        dndEnabled = next;
        updateDndUI();
        if (!dndEnabled) maybeDrainNext();
      } catch {
        showNotif('Impossible de modifier le mode');
      }
    }

    dndBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      toggleDnd();
    });

    async function loadDnd() {
      try {
        const r = await fetch('/dnd');
        const data = await r.json();
        dndEnabled = data.enabled === true;
        updateDndUI();
      } catch {}
    }
    loadDnd();

    // Owner of this Pi — drives the crema·<owner> idle watermark.
    async function loadOwner() {
      try {
        const r = await fetch('/me');
        const data = await r.json();
        if (data.owner) {
          OWNER_NAME = data.owner;
          SELF_NICKNAME = data.nickname || '';
          if (mode === 'idle') renderIdle();
        }
      } catch {}
    }
    loadOwner();

    // ===== Reply handling + tap-to-dismiss =====
    screen.addEventListener('click', async (e) => {
      const btn = e.target.closest('.reply-btn');

      // Tap anywhere outside a reply button → dismiss the current message.
      if (!btn) {
        if (mode === 'message') leaveMessage();
        return;
      }

      // Disabled button (already replied / failed): swallow the tap so the
      // user doesn't accidentally dismiss the "✓ Sent" feedback.
      if (btn.disabled || !currentMsg?.fromInstanceId) return;

      const idx = Number(btn.dataset.i);
      const items = activeReplyItems();
      const reply = items[idx];
      if (!reply) return;

      const allBtns = screen.querySelectorAll('.reply-btn');
      for (const b of allBtns) b.disabled = true;
      selfReplying = true;  // ignore the msg:answered echo of our own reply

      try {
        const r = await fetch('/reply', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            to: currentMsg.fromInstanceId,
            label: reply.label,
            replyToMsgId: currentMsg.id || null,
            via: 'screen',
          }),
        });
        if (!r.ok) throw new Error('send failed');
        btn.classList.add('sent');
        btn.textContent = '✓ ' + reply.label;
        if (resetTimer) clearTimeout(resetTimer);
        // Return to idle via the mirror exit animation after a brief beat.
        resetTimer = setTimeout(leaveMessage, REPLY_RETURN_DELAY_MS);
      } catch {
        selfReplying = false;  // failed → an external answer may still dismiss
        btn.classList.add('failed');
        btn.textContent = '✕ ' + reply.label;
        setTimeout(() => {
          for (const b of allBtns) b.disabled = false;
          btn.classList.remove('failed');
          btn.textContent = reply.label;
        }, 2000);
      }
    });

    // ===== Clock + subtitle tick =====
    showIdle();
    const msToNextSecond = 1_000 - (Date.now() % 1_000);
    setTimeout(() => {
      tickEverySecond();
      setInterval(tickEverySecond, 1_000);
    }, msToNextSecond);

    function tickEverySecond() {
      if (mode === 'idle') {
        // Only re-render the clock when the minute rolls over.
        if (Date.now() % 60_000 < 1_000) renderIdle();
      } else if (mode === 'message') {
        refreshAgoInPlace();
      }
    }

    // ===== Day/night theme =====
    let schedule = null;

    async function loadSchedule() {
      try {
        const r = await fetch('/theme-schedule');
        schedule = await r.json();
        applyTheme();
      } catch {}
    }

    function applyTheme() {
      if (!schedule) return;
      const now = new Date();
      const sunrise = new Date(schedule.sunrise);
      const sunset = new Date(schedule.sunset);
      const isDay = now >= sunrise && now < sunset;
      const wasDay = document.body.classList.contains('day');
      document.body.classList.toggle('day', isDay);
      document.body.classList.toggle('night', !isDay);
      // Re-render so the footer jour/nuit label tracks the flip.
      if (isDay !== wasDay && mode === 'idle') renderIdle();
    }

    function scheduleMidnightRefresh() {
      const now = new Date();
      const next = new Date(now);
      next.setDate(now.getDate() + 1);
      next.setHours(0, 0, 30, 0);
      setTimeout(async () => {
        await loadSchedule();
        scheduleMidnightRefresh();
      }, next - now);
    }

    loadSchedule();
    setInterval(applyTheme, 60_000);
    scheduleMidnightRefresh();

    // ===== Replies fetch =====
    async function loadReplies() {
      try {
        const r = await fetch('/replies');
        replies = await r.json();
        if (mode === 'message') renderMessage();
      } catch {}
    }
    loadReplies();

    // ===== Shortcuts fetch + tap handler =====
    async function loadShortcuts() {
      try {
        const r = await fetch('/shortcuts');
        shortcuts = await r.json();
        renderShortcuts();
      } catch {}
    }
    async function loadDefaultTarget() {
      try {
        const r = await fetch('/default-target');
        currentTarget = (await r.json()).target || '';
      } catch {}
      renderDestBar();
      renderShortcuts();
    }
    loadShortcuts();
    loadDefaultTarget();

    // Perform the send + on-button feedback. targetOwner is optional; omitted,
    // the server resolves the shortcut's pinned target or the global recipient.
    async function sendShortcut(s, targetOwner, btn) {
      const allBtns = shortcutsBar.querySelectorAll('.shortcut-btn');
      for (const b of allBtns) b.disabled = true;

      const lblEl = btn.querySelector('.lbl');
      const originalLabel = lblEl ? lblEl.textContent : '';
      const body = targetOwner ? { id: s.id, targetOwner } : { id: s.id };

      try {
        const r = await fetch('/shortcut/send', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        if (!r.ok) throw new Error();
        btn.classList.add('sent');
        if (lblEl) lblEl.textContent = '✓ Envoyé';
        setTimeout(renderShortcuts, 1500);
      } catch {
        btn.classList.add('failed');
        if (lblEl) lblEl.textContent = '✕ Échec';
        setTimeout(() => {
          btn.classList.remove('failed');
          if (lblEl) lblEl.textContent = originalLabel;
          renderShortcuts();
        }, 2000);
      }
    }

    // ===== Recipient picker — pick the global recipient (single, min 1) =====
    let pickerSelection = '';

    function openTargetPicker() {
      const owners = onlineOwners();
      pickerSelection = owners.some((o) => o.owner === currentTarget) ? currentTarget : '';
      if (owners.length === 0) {
        tpTiles.innerHTML = '<div class="tp-empty">Aucun pair en ligne</div>';
      } else {
        tpTiles.innerHTML = owners.map((o) => `
          <button class="tp-tile${o.owner === pickerSelection ? ' selected' : ''}" data-owner="${escapeHtml(o.owner)}">
            <span class="tp-dot"></span>
            <span class="tp-name">${escapeHtml(o.nickname || o.owner)}</span>
          </button>
        `).join('');
      }
      tpValider.disabled = !pickerSelection;
      targetPicker.classList.add('open');
    }

    function closeTargetPicker() {
      targetPicker.classList.remove('open');
    }

    destChangeBtn.addEventListener('click', openTargetPicker);

    // Tap outside the card dismisses.
    targetPicker.addEventListener('click', (e) => {
      if (e.target === targetPicker) closeTargetPicker();
    });

    tpTiles.addEventListener('click', (e) => {
      const tile = e.target.closest('.tp-tile');
      if (!tile) return;
      pickerSelection = tile.dataset.owner;
      tpTiles.querySelectorAll('.tp-tile').forEach((t) => t.classList.toggle('selected', t === tile));
      tpValider.disabled = false;
    });

    tpValider.addEventListener('click', async () => {
      if (!pickerSelection) return;
      const chosen = pickerSelection;
      try {
        await fetch('/default-target', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ target: chosen }),
        });
      } catch {}
      // Optimistic — the socket echo (default-target:updated) confirms.
      currentTarget = chosen;
      closeTargetPicker();
      renderDestBar();
      renderShortcuts();
    });

    shortcutsBar.addEventListener('click', (e) => {
      const btn = e.target.closest('.shortcut-btn');
      if (!btn || btn.disabled) return;
      const s = shortcuts[Number(btn.dataset.i)];
      if (!s) return;
      // Pinned shortcut → server uses its own target. Global → pass the current
      // effective recipient as an explicit override.
      const override = s.targetOwner ? undefined : effectiveTarget();
      sendShortcut(s, override, btn);
    });

    // ===== Socket =====
    const socket = io();

    socket.on('peers:init', (list) => {
      peers.clear();
      for (const p of list) peers.set(p.instanceId, { owner: p.owner, nickname: p.nickname || '' });
      renderPresence();
      renderShortcuts();
      renderDestBar();
      renderServerStatus();
    });
    socket.on('peer:up', ({ instanceId, owner, nickname }) => {
      // Upsert — also how a nickname change lands (same instanceId, new name).
      peers.set(instanceId, { owner, nickname: nickname || '' });
      renderPresence();
      renderShortcuts();
      renderDestBar();
      renderServerStatus();
      // A message on screen from this sender → refresh its displayed name.
      if (mode === 'message' && currentMsg && currentMsg.from === owner) renderMessage();
    });
    socket.on('peer:down', ({ instanceId }) => {
      peers.delete(instanceId);
      renderPresence();
      renderShortcuts();
      renderDestBar();
      renderServerStatus();
    });

    // Transport health drives the server-status watermark (broker up/down).
    socket.on('transport:health', ({ broker } = {}) => {
      brokerState = broker ?? null;
      renderServerStatus();
    });

    // This Pi's own nickname changed (edited from the PWA settings) — refresh
    // the idle watermark live.
    socket.on('profile:updated', ({ nickname } = {}) => {
      SELF_NICKNAME = nickname || '';
      if (mode === 'idle') renderIdle();
    });

    socket.on('replies:updated', (list) => {
      replies = list;
      if (mode === 'message') renderMessage();
    });

    socket.on('shortcuts:updated', (list) => {
      shortcuts = list;
      renderShortcuts();
    });

    // Global recipient changed (here or from another front-end) — stay in sync.
    socket.on('default-target:updated', ({ target } = {}) => {
      currentTarget = target || '';
      renderDestBar();
      renderShortcuts();
    });

    socket.on('message', (data) => {
      if (!data || typeof data.text !== 'string' || !data.text.trim()) return;
      // Stamp the arrival time so the "il y a Xs" subtitle stays honest
      // even if the message sits in the queue for a while.
      data.arrivedAt = Date.now();
      // Hold the message back if one is showing/leaving or DND is on — it'll
      // be drained from the queue once we're back to idle.
      if (mode !== 'idle' || dndEnabled) {
        queueIncoming(data);
      } else {
        showMessage(data);
      }
    });

    socket.on('msg:expired', ({ text, targetOwner }) => {
      showNotif(`« ${truncate(text, 40)} » sans réponse de ${targetOwner}`);
    });

    // A reply was sent from one of our own clients (typically the PWA) → the
    // original message is answered. Dismiss it if it's on screen; otherwise drop
    // it from the queue. Replies tapped on this screen set selfReplying and are
    // ignored (they run their own ✓ + exit).
    socket.on('msg:answered', ({ replyToMsgId } = {}) => {
      if (!replyToMsgId || selfReplying) return;
      if (mode === 'message' && currentMsg?.id === replyToMsgId) {
        leaveMessage();
        return;
      }
      const i = messageQueue.findIndex((m) => m && m.id === replyToMsgId);
      if (i !== -1) { messageQueue.splice(i, 1); updateMsgStat(); }
    });

    socket.on('dnd:updated', ({ enabled }) => {
      const was = dndEnabled;
      dndEnabled = enabled === true;
      updateDndUI();
      if (was && !dndEnabled) maybeDrainNext();
    });

    // V6.2 — typing indicator from a peer's PWA. Auto-clears 5 s after the
    // last 'start' renew, so a lost 'stop' won't leave the dots stuck.
    socket.on('typing', ({ from, state }) => {
      if (!from) return;
      const existing = typingOwners.get(from);
      if (existing) clearTimeout(existing);
      if (state === 'start') {
        const timer = setTimeout(() => {
          typingOwners.delete(from);
          renderPresence();
        }, 5000);
        typingOwners.set(from, timer);
      } else {
        typingOwners.delete(from);
      }
      renderPresence();
    });
  </script>
</body>
</html>
