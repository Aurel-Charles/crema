<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Crema — Display</title>
  <link rel="stylesheet" href="/theme.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }

    body {
      font-family: var(--crema-font-sans);
      background: var(--crema-bg);
      color: var(--crema-text);
      min-height: 100vh;
      padding: 32px;
      overflow: hidden;
      cursor: none;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background-color 1.5s ease, color 1.5s ease;
    }

    .topbar {
      position: absolute;
      top: 24px;
      right: 28px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 10px;
      pointer-events: none;
    }

    .dnd-btn {
      pointer-events: auto;
      position: relative;
      width: 42px;
      height: 42px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      border-radius: 50%;
      color: var(--crema-muted);
      cursor: pointer;
      transition: color 0.2s ease, background 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .dnd-btn:active { background: rgba(232, 137, 110, 0.18); }
    .dnd-btn .moon {
      width: 22px;
      height: 22px;
      transition: fill 0.2s ease, stroke 0.2s ease;
    }
    .dnd-btn.on {
      background: var(--crema-accent);
      color: var(--crema-bg);
      box-shadow: 0 0 14px rgba(232, 137, 110, 0.4);
    }
    .dnd-btn.on .moon {
      fill: var(--crema-bg);
      stroke: var(--crema-bg);
    }
    .dnd-btn .badge {
      position: absolute;
      top: -2px;
      right: -4px;
      min-width: 20px;
      height: 20px;
      padding: 0 6px;
      background: var(--crema-accent);
      color: var(--crema-bg);
      font-size: 12px;
      font-weight: 700;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .dnd-btn .badge[hidden] { display: none; }
    .dnd-btn.on .badge {
      background: var(--crema-bg);
      color: var(--crema-accent);
      box-shadow: 0 0 0 2px var(--crema-accent);
    }

    .presence {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: clamp(13px, 1.5vw, 18px);
      font-weight: 500;
      color: var(--crema-muted);
      letter-spacing: 0.02em;
    }
    .presence .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--crema-presence);
      box-shadow: 0 0 8px var(--crema-presence);
      flex-shrink: 0;
    }
    /* Name wears .crema-label in markup; we only need the color override. */
    .presence .name { color: var(--crema-text); }
    .typing-dots {
      display: inline-block;
      letter-spacing: 1px;
      margin-left: 1px;
    }
    .typing-dots span {
      display: inline-block;
      opacity: 0.3;
      animation: typing-bounce 1.2s infinite ease-in-out;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.15s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes typing-bounce {
      0%, 60%, 100% { opacity: 0.3; }
      30% { opacity: 1; }
    }

    #notif {
      position: absolute;
      top: 24px;
      left: 28px;
      max-width: 45vw;
      padding: 10px 14px;
      font-family: var(--crema-font-mono);
      font-size: clamp(11px, 1.2vw, 14px);
      letter-spacing: 0.04em;
      color: var(--crema-text);
      background: rgba(255, 255, 255, 0.4);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid var(--crema-stroke);
      border-radius: 14px;
      opacity: 0;
      transform: translateX(-12px);
      transition: opacity 0.3s ease, transform 0.3s ease;
      pointer-events: none;
    }
    #notif.visible {
      opacity: 1;
      transform: translateX(0);
    }

    #screen {
      max-width: 90vw;
      text-align: center;
      line-height: 1.15;
    }

    .idle .clock {
      font-family: var(--crema-font-serif);
      font-style: italic;
      font-size: clamp(96px, 22vw, 240px);
      font-weight: 400;
      color: var(--crema-text);
      letter-spacing: -0.04em;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 6px 40px rgba(232, 137, 110, 0.35);
      transition: color 1.5s ease;
    }
    /* The date wears the .crema-label signature (set in markup) — same
     * kerned-uppercase identity mark used by day headers in /history. */
    .idle .date {
      font-size: clamp(14px, 1.8vw, 22px);
      color: var(--crema-muted);
      margin-top: 18px;
      transition: color 1.5s ease;
    }

    @keyframes msg-enter {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .msg {
      animation: msg-enter 280ms cubic-bezier(0.2, 0.7, 0.2, 1) both;
    }

    /* SENDER label — signature kerned, opacity 0.78 per Direction Sauge */
    .msg .from {
      font-size: clamp(13px, 1.5vw, 18px);
      color: var(--crema-text);
      opacity: 0.78;
      margin-bottom: 4px;
    }
    .msg .subtitle {
      font-size: clamp(12px, 1.2vw, 14px);
      color: var(--crema-muted);
      opacity: 0.75;
      margin-top: 4px;
      margin-bottom: 22px;
      font-variant-numeric: tabular-nums;
    }
    .msg .text {
      font-family: var(--crema-font-serif);
      font-size: clamp(38px, 6vw, 64px);
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.1;
      color: var(--crema-text);
    }
    .msg .text .reply-prefix {
      color: var(--crema-muted);
      margin-right: 0.4em;
      font-style: italic;
    }
    .msg .reply-context {
      font-family: var(--crema-font-serif);
      font-size: clamp(16px, 2.2vw, 24px);
      font-style: italic;
      color: var(--crema-muted);
      opacity: 0.78;
      max-width: 70vw;
      margin: 0 auto 18px;
      line-height: 1.3;
    }

    .reply-bar {
      margin-top: 36px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .reply-btn {
      min-height: 56px;
      min-width: 56px;
      padding: 12px 24px;
      font-family: inherit;
      font-size: clamp(18px, 2vw, 22px);
      font-weight: 500;
      color: var(--crema-accent);
      background: rgba(232, 137, 110, 0.1);
      border: 1.5px solid rgba(232, 137, 110, 0.4);
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.15s ease, transform 0.05s ease, border-color 0.15s ease, color 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .reply-btn:active {
      transform: scale(0.96);
      background: rgba(232, 137, 110, 0.22);
    }
    .reply-btn:disabled { opacity: 0.5; cursor: default; }
    /* Filled sage — unambiguous success. Was border-only on a sage-tinted
     * bg, which read too close to the resting state since presence and
     * accent share the same #A8C49C. */
    .reply-btn.sent {
      background: var(--crema-accent);
      border-color: var(--crema-accent);
      color: var(--crema-accent-ink);
    }
    .reply-btn.failed {
      background: rgba(179, 38, 30, 0.15);
      border-color: var(--crema-danger);
      color: var(--crema-danger);
    }

    .progress {
      margin: 32px auto 0;
      width: clamp(200px, 38vw, 360px);
      height: 3px;
      background: rgba(232, 137, 110, 0.12);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      width: 100%;
      height: 100%;
      background: var(--crema-accent);
      transform-origin: left center;
      transform: scaleX(1);
    }

    /* Shortcuts row in idle (V5) */
    #shortcuts-bar {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      max-width: 92vw;
      flex-wrap: wrap;
      justify-content: center;
    }
    #shortcuts-bar:empty { display: none; }
    .shortcut-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 12px 16px;
      min-width: 96px;
      min-height: 78px;
      font-family: inherit;
      background: rgba(232, 137, 110, 0.08);
      border: 1.5px solid rgba(232, 137, 110, 0.35);
      border-radius: 18px;
      cursor: pointer;
      transition: background 0.15s, transform 0.05s, border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
      color: var(--crema-text);
    }
    .shortcut-btn:active {
      transform: scale(0.96);
      background: rgba(232, 137, 110, 0.22);
    }
    .shortcut-btn:disabled {
      opacity: 0.32;
      cursor: default;
    }
    .shortcut-btn .icon {
      font-size: 26px;
      line-height: 1;
    }
    .shortcut-btn .lbl {
      font-size: 13px;
      font-weight: 500;
      color: var(--crema-text);
      max-width: 110px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .shortcut-btn.sent {
      background: rgba(232, 137, 110, 0.18);
      border-color: var(--crema-presence);
    }
    .shortcut-btn.failed {
      background: rgba(179, 38, 30, 0.18);
      border-color: var(--crema-danger);
    }
  </style>
</head>
<body class="crema-display night">
  <header class="topbar">
    <button id="dnd-btn" class="dnd-btn" type="button" aria-label="Ne pas déranger">
      <svg class="moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
      </svg>
      <span class="badge" hidden>0</span>
    </button>
    <div id="presence-list"></div>
  </header>

  <div id="notif"></div>

  <main id="screen"></main>

  <footer id="shortcuts-bar"></footer>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    // ===== Elements =====
    const screen = document.getElementById('screen');
    const presenceList = document.getElementById('presence-list');
    const notifEl = document.getElementById('notif');
    const shortcutsBar = document.getElementById('shortcuts-bar');
    const dndBtn = document.getElementById('dnd-btn');
    const dndBadge = dndBtn.querySelector('.badge');

    const DEFAULT_DISPLAY_MS = 30_000;
    const REPLY_DISPLAY_MS = 10_000;
    const MIN_DISPLAY_MS = 2_000;
    const REPLY_RETURN_DELAY_MS = 1_500;
    const NOTIF_VISIBLE_MS = 10_000;
    const REPLY_CONTEXT_MAX_CHARS = 60;
    const QUEUE_CAP = 5;
    const QUEUE_DRAIN_DELAY_MS = 600;
    const NOTIF_PREVIEW_MAX_CHARS = 36;

    const dateFmt = new Intl.DateTimeFormat('fr-FR', {
      weekday: 'long', day: 'numeric', month: 'long',
    });
    const timeFmt = new Intl.DateTimeFormat('fr-FR', {
      hour: '2-digit', minute: '2-digit', hour12: false,
    });

    // ===== State =====
    let mode = 'idle';
    let resetTimer = null;
    let notifTimer = null;
    let currentMsg = null;
    let replies = [];
    let shortcuts = [];
    const peers = new Map();
    let dndEnabled = false;
    const messageQueue = [];
    const typingOwners = new Map(); // owner → auto-clear timeout id

    // ===== Time formatting =====
    function formatAgo(ms) {
      const s = Math.max(0, Math.floor(ms / 1000));
      if (s < 60) return `il y a ${s} s`;
      const m = Math.floor(s / 60);
      if (m < 60) return `il y a ${m} min`;
      const h = Math.floor(m / 60);
      const rem = m % 60;
      return `il y a ${h} h${rem > 0 ? ` ${rem} min` : ''}`;
    }
    function formatRemaining(ms) {
      if (ms <= 0) return 'expiré';
      const s = Math.ceil(ms / 1000);
      if (s < 60) return `encore ${s} s`;
      const m = Math.ceil(s / 60);
      if (m < 60) return `encore ${m} min`;
      const h = Math.floor(m / 60);
      const rem = m % 60;
      return `encore ${h} h${rem > 0 ? ` ${rem} min` : ''}`;
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (c) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
      }[c]));
    }

    function truncate(s, max) {
      return s.length > max ? s.slice(0, max - 1).trimEnd() + '…' : s;
    }

    // ===== Render =====
    function renderIdle() {
      const now = new Date();
      screen.className = 'idle';
      screen.innerHTML = `
        <div class="clock">${timeFmt.format(now)}</div>
        <div class="date crema-label">${dateFmt.format(now)}</div>
      `;
    }

    function showIdle() {
      mode = 'idle';
      currentMsg = null;
      if (resetTimer) { clearTimeout(resetTimer); resetTimer = null; }
      renderIdle();
      renderShortcuts();
      maybeDrainNext();
    }

    function showMessage(data) {
      mode = 'message';
      // Use arrivedAt if set (message was queued), else stamp now.
      // This keeps the "il y a Xs" subtitle honest for drained messages.
      const receivedAt = data.arrivedAt ?? Date.now();
      const expiresAtMs = data.expiresAt ? Date.parse(data.expiresAt) : null;
      currentMsg = { ...data, receivedAt, expiresAtMs };
      renderMessage();
      renderShortcuts(); // will hide while in message mode

      if (resetTimer) clearTimeout(resetTimer);
      const ttl = expiresAtMs
        ? Math.max(MIN_DISPLAY_MS, expiresAtMs - Date.now())
        : (data.isReply ? REPLY_DISPLAY_MS : DEFAULT_DISPLAY_MS);
      resetTimer = setTimeout(showIdle, ttl);

      if (expiresAtMs) startProgressAnimation(ttl);

      // Tell the original sender we just displayed their message (V6.1).
      // Replies don't carry an id over the wire, skip them.
      if (data.id && data.fromInstanceId && !data.isReply) {
        socket.emit('msg:read', { id: data.id, fromInstanceId: data.fromInstanceId });
      }
    }

    function renderMessage() {
      if (!currentMsg) return;
      const { text, from, isReply, replyToText } = currentMsg;
      const fromLabel = from ? `<div class="from crema-label">${escapeHtml(from)}</div>` : '';
      const subtitle = `<div class="subtitle">${buildSubtitle()}</div>`;
      const context = (isReply && replyToText)
        ? `<div class="reply-context">en réponse à «&nbsp;${escapeHtml(truncate(replyToText, REPLY_CONTEXT_MAX_CHARS))}&nbsp;»</div>`
        : '';
      const prefix = isReply ? '<span class="reply-prefix">↩</span>' : '';
      const progress = currentMsg.expiresAtMs
        ? '<div class="progress"><div class="progress-fill"></div></div>'
        : '';
      screen.className = 'msg';
      screen.innerHTML = `${fromLabel}${subtitle}${context}<div class="text">${prefix}${escapeHtml(text)}</div>${replyBarHtml()}${progress}`;
    }

    function buildSubtitle() {
      if (!currentMsg) return '';
      const ago = formatAgo(Date.now() - currentMsg.receivedAt);
      if (currentMsg.expiresAtMs) {
        return `${ago} · ${formatRemaining(currentMsg.expiresAtMs - Date.now())}`;
      }
      return ago;
    }

    function refreshSubtitleInPlace() {
      if (mode !== 'message') return;
      const sub = screen.querySelector('.subtitle');
      if (sub) sub.textContent = buildSubtitle();
    }

    function activeReplyItems() {
      if (!currentMsg) return [];
      const opts = currentMsg.responseOptions;
      return (opts && opts.length > 0) ? opts : replies;
    }

    function replyBarHtml() {
      if (!currentMsg) return '';
      const { fromInstanceId, isReply } = currentMsg;
      if (isReply || !fromInstanceId) return '';
      const items = activeReplyItems();
      if (items.length === 0) return '';
      const buttons = items
        .map((r, i) => `<button class="reply-btn" data-i="${i}">${escapeHtml(r.label)}</button>`)
        .join('');
      return `<div class="reply-bar">${buttons}</div>`;
    }

    function startProgressAnimation(durationMs) {
      const fill = screen.querySelector('.progress-fill');
      if (!fill) return;
      // Reset to full, force reflow, then animate to empty over the TTL.
      fill.style.transition = 'none';
      fill.style.transform = 'scaleX(1)';
      void fill.offsetHeight;
      fill.style.transition = `transform ${durationMs}ms linear`;
      fill.style.transform = 'scaleX(0)';
    }

    function renderPresence() {
      if (peers.size === 0) { presenceList.innerHTML = ''; return; }
      const seenOwners = new Set();
      const rows = [];
      for (const owner of peers.values()) {
        if (seenOwners.has(owner)) continue;
        seenOwners.add(owner);
        const statusHtml = typingOwners.has(owner)
          ? `écrit<span class="typing-dots"><span>.</span><span>.</span><span>.</span></span>`
          : 'en ligne';
        rows.push(`
          <div class="presence">
            <span class="dot"></span>
            <span><span class="name crema-label">${escapeHtml(owner)}</span> ${statusHtml}</span>
          </div>
        `);
      }
      presenceList.innerHTML = rows.join('');
    }

    function isOwnerOnline(owner) {
      for (const o of peers.values()) if (o === owner) return true;
      return false;
    }

    function renderShortcuts() {
      if (mode !== 'idle' || shortcuts.length === 0) {
        shortcutsBar.innerHTML = '';
        return;
      }
      shortcutsBar.innerHTML = shortcuts.map((s, i) => {
        const online = isOwnerOnline(s.targetOwner);
        const iconHtml = s.icon ? `<span class="icon">${escapeHtml(s.icon)}</span>` : '';
        return `
          <button class="shortcut-btn" data-i="${i}" ${online ? '' : 'disabled'}>
            ${iconHtml}
            <span class="lbl">${escapeHtml(s.label)}</span>
          </button>
        `;
      }).join('');
    }

    function showNotif(text) {
      notifEl.textContent = text;
      notifEl.classList.add('visible');
      if (notifTimer) clearTimeout(notifTimer);
      notifTimer = setTimeout(() => notifEl.classList.remove('visible'), NOTIF_VISIBLE_MS);
    }

    // ===== DND + message queue =====
    function updateDndUI() {
      dndBtn.classList.toggle('on', dndEnabled);
    }

    function updateBadge() {
      const n = messageQueue.length;
      if (n === 0) {
        dndBadge.hidden = true;
      } else {
        dndBadge.hidden = false;
        dndBadge.textContent = String(n);
      }
    }

    function queueIncoming(data) {
      if (messageQueue.length >= QUEUE_CAP) messageQueue.shift();
      messageQueue.push(data);
      updateBadge();
      const sender = data.from ? `${data.from} · ` : '';
      const ts = timeFmt.format(new Date(data.arrivedAt));
      showNotif(`${sender}${ts} · ${truncate(data.text, NOTIF_PREVIEW_MAX_CHARS)}`);
    }

    function maybeDrainNext() {
      if (messageQueue.length === 0 || dndEnabled || mode !== 'idle') return;
      const next = messageQueue.shift();
      updateBadge();
      setTimeout(() => {
        if (mode === 'idle' && !dndEnabled) showMessage(next);
      }, QUEUE_DRAIN_DELAY_MS);
    }

    async function toggleDnd() {
      const next = !dndEnabled;
      try {
        const r = await fetch('/dnd', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ enabled: next }),
        });
        if (!r.ok) throw new Error();
        // Optimistic flip — dnd:updated will reconfirm shortly.
        dndEnabled = next;
        updateDndUI();
        if (!dndEnabled) maybeDrainNext();
      } catch {
        showNotif('Impossible de modifier le mode');
      }
    }

    dndBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      toggleDnd();
    });

    async function loadDnd() {
      try {
        const r = await fetch('/dnd');
        const data = await r.json();
        dndEnabled = data.enabled === true;
        updateDndUI();
      } catch {}
    }
    loadDnd();

    // ===== Reply handling + tap-to-dismiss =====
    screen.addEventListener('click', async (e) => {
      const btn = e.target.closest('.reply-btn');

      // Tap anywhere outside a reply button → dismiss the current message.
      if (!btn) {
        if (mode === 'message') showIdle();
        return;
      }

      // Disabled button (already replied / failed): swallow the tap so the
      // user doesn't accidentally dismiss the "✓ Sent" feedback.
      if (btn.disabled || !currentMsg?.fromInstanceId) return;

      const idx = Number(btn.dataset.i);
      const items = activeReplyItems();
      const reply = items[idx];
      if (!reply) return;

      const allBtns = screen.querySelectorAll('.reply-btn');
      for (const b of allBtns) b.disabled = true;

      try {
        const r = await fetch('/reply', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            to: currentMsg.fromInstanceId,
            label: reply.label,
            replyToMsgId: currentMsg.id || null,
          }),
        });
        if (!r.ok) throw new Error('send failed');
        btn.classList.add('sent');
        btn.textContent = '✓ ' + reply.label;
        if (resetTimer) clearTimeout(resetTimer);
        resetTimer = setTimeout(showIdle, REPLY_RETURN_DELAY_MS);
      } catch {
        btn.classList.add('failed');
        btn.textContent = '✕ ' + reply.label;
        setTimeout(() => {
          for (const b of allBtns) b.disabled = false;
          btn.classList.remove('failed');
          btn.textContent = reply.label;
        }, 2000);
      }
    });

    // ===== Clock + subtitle tick =====
    showIdle();
    const msToNextSecond = 1_000 - (Date.now() % 1_000);
    setTimeout(() => {
      tickEverySecond();
      setInterval(tickEverySecond, 1_000);
    }, msToNextSecond);

    function tickEverySecond() {
      if (mode === 'idle') {
        // Only re-render the clock when the minute rolls over.
        if (Date.now() % 60_000 < 1_000) renderIdle();
      } else if (mode === 'message') {
        refreshSubtitleInPlace();
      }
    }

    // ===== Day/night theme =====
    let schedule = null;

    async function loadSchedule() {
      try {
        const r = await fetch('/theme-schedule');
        schedule = await r.json();
        applyTheme();
      } catch {}
    }

    function applyTheme() {
      if (!schedule) return;
      const now = new Date();
      const sunrise = new Date(schedule.sunrise);
      const sunset = new Date(schedule.sunset);
      const isDay = now >= sunrise && now < sunset;
      document.body.classList.toggle('day', isDay);
      document.body.classList.toggle('night', !isDay);
    }

    function scheduleMidnightRefresh() {
      const now = new Date();
      const next = new Date(now);
      next.setDate(now.getDate() + 1);
      next.setHours(0, 0, 30, 0);
      setTimeout(async () => {
        await loadSchedule();
        scheduleMidnightRefresh();
      }, next - now);
    }

    loadSchedule();
    setInterval(applyTheme, 60_000);
    scheduleMidnightRefresh();

    // ===== Replies fetch =====
    async function loadReplies() {
      try {
        const r = await fetch('/replies');
        replies = await r.json();
        if (mode === 'message') renderMessage();
      } catch {}
    }
    loadReplies();

    // ===== Shortcuts fetch + tap handler =====
    async function loadShortcuts() {
      try {
        const r = await fetch('/shortcuts');
        shortcuts = await r.json();
        renderShortcuts();
      } catch {}
    }
    loadShortcuts();

    shortcutsBar.addEventListener('click', async (e) => {
      const btn = e.target.closest('.shortcut-btn');
      if (!btn || btn.disabled) return;
      const i = Number(btn.dataset.i);
      const s = shortcuts[i];
      if (!s) return;

      const allBtns = shortcutsBar.querySelectorAll('.shortcut-btn');
      for (const b of allBtns) b.disabled = true;

      const lblEl = btn.querySelector('.lbl');
      const originalLabel = lblEl ? lblEl.textContent : '';

      try {
        const r = await fetch('/shortcut/send', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id: s.id }),
        });
        if (!r.ok) throw new Error();
        btn.classList.add('sent');
        if (lblEl) lblEl.textContent = '✓ Envoyé';
        setTimeout(renderShortcuts, 1500);
      } catch {
        btn.classList.add('failed');
        if (lblEl) lblEl.textContent = '✕ Échec';
        setTimeout(() => {
          btn.classList.remove('failed');
          if (lblEl) lblEl.textContent = originalLabel;
          renderShortcuts();
        }, 2000);
      }
    });

    // ===== Socket =====
    const socket = io();

    socket.on('peers:init', (list) => {
      peers.clear();
      for (const p of list) peers.set(p.instanceId, p.owner);
      renderPresence();
      renderShortcuts();
    });
    socket.on('peer:up', ({ instanceId, owner }) => {
      peers.set(instanceId, owner);
      renderPresence();
      renderShortcuts();
    });
    socket.on('peer:down', ({ instanceId }) => {
      peers.delete(instanceId);
      renderPresence();
      renderShortcuts();
    });

    socket.on('replies:updated', (list) => {
      replies = list;
      if (mode === 'message') renderMessage();
    });

    socket.on('shortcuts:updated', (list) => {
      shortcuts = list;
      renderShortcuts();
    });

    socket.on('message', (data) => {
      if (!data || typeof data.text !== 'string' || !data.text.trim()) return;
      // Stamp the arrival time so the "il y a Xs" subtitle stays honest
      // even if the message sits in the queue for a while.
      data.arrivedAt = Date.now();
      // Hold the message back if we're already showing one or DND is on.
      // It'll be drained later from the queue.
      if (mode === 'message' || dndEnabled) {
        queueIncoming(data);
      } else {
        showMessage(data);
      }
    });

    socket.on('msg:expired', ({ text, targetOwner }) => {
      showNotif(`« ${truncate(text, 40)} » sans réponse de ${targetOwner}`);
    });

    socket.on('dnd:updated', ({ enabled }) => {
      const was = dndEnabled;
      dndEnabled = enabled === true;
      updateDndUI();
      if (was && !dndEnabled) maybeDrainNext();
    });

    // V6.2 — typing indicator from a peer's PWA. Auto-clears 5 s after the
    // last 'start' renew, so a lost 'stop' won't leave the dots stuck.
    socket.on('typing', ({ from, state }) => {
      if (!from) return;
      const existing = typingOwners.get(from);
      if (existing) clearTimeout(existing);
      if (state === 'start') {
        const timer = setTimeout(() => {
          typingOwners.delete(from);
          renderPresence();
        }, 5000);
        typingOwners.set(from, timer);
      } else {
        typingOwners.delete(from);
      }
      renderPresence();
    });
  </script>
</body>
</html>
