<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Crema — Display</title>
  <link rel="stylesheet" href="/theme.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }

    body {
      font-family: var(--crema-font-sans);
      background: var(--crema-bg);
      color: var(--crema-text);
      height: 100vh;
      padding: 0;
      overflow: hidden;
      cursor: none;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background-color 1.5s ease, color 1.5s ease;
    }

    /* ===== Responsive: 800×480 stage, scaled to fit any viewport =====
     * The whole UI is authored in the Pi's native 800×480 (5:3) coordinate
     * space, then scaled as one block (transform) so it stays pixel-faithful
     * on phone / tablet / desktop. --stage-scale is computed in JS on resize.
     * The warm body gradient fills the letterbox around it. */
    .stage {
      position: relative;
      flex: none;
      width: 800px;
      height: 480px;
      transform: scale(var(--stage-scale, 1));
      transform-origin: center center;
      /* Centers the in-flow #screen.msg; absolutely-positioned children
       * (idle layout, topbar, notif, shortcuts) ignore flex. */
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Top-left controls: sit just right of the vertical crema·aurel
     * watermark (idle-watermark lives at left:18). Row layout: moon, then
     * presence — matches the agreed Mega-Type idle composition. */
    .topbar {
      position: absolute;
      top: 22px;
      left: 48px;
      z-index: 40;
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 14px;
      pointer-events: none;
    }

    .dnd-btn {
      pointer-events: auto;
      position: relative;
      width: 42px;
      height: 42px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      border-radius: 50%;
      color: var(--crema-muted);
      cursor: pointer;
      transition: color 0.2s ease, background 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .dnd-btn:active { background: rgba(232, 137, 110, 0.18); }
    .dnd-btn .moon {
      width: 22px;
      height: 22px;
      transition: fill 0.2s ease, stroke 0.2s ease;
    }
    .dnd-btn.on {
      background: var(--crema-accent);
      color: var(--crema-bg);
      box-shadow: 0 0 14px rgba(232, 137, 110, 0.4);
    }
    .dnd-btn.on .moon {
      fill: var(--crema-bg);
      stroke: var(--crema-bg);
    }
    .presence {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: clamp(13px, 1.5vw, 18px);
      font-weight: 500;
      color: var(--crema-muted);
      letter-spacing: 0.02em;
    }
    .presence .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--crema-presence);
      box-shadow: 0 0 8px var(--crema-presence);
      flex-shrink: 0;
    }
    /* Name wears .crema-label in markup; we only need the color override. */
    .presence .name { color: var(--crema-text); }
    .typing-dots {
      display: inline-block;
      letter-spacing: 1px;
      margin-left: 1px;
    }
    .typing-dots span {
      display: inline-block;
      opacity: 0.3;
      animation: typing-bounce 1.2s infinite ease-in-out;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.15s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes typing-bounce {
      0%, 60%, 100% { opacity: 0.3; }
      30% { opacity: 1; }
    }

    /* Transient toast moved to the top-right (presence now owns top-left). */
    #notif {
      position: absolute;
      top: 24px;
      right: 28px;
      z-index: 45;
      max-width: 45vw;
      padding: 10px 14px;
      font-family: var(--crema-font-mono);
      font-size: clamp(11px, 1.2vw, 14px);
      letter-spacing: 0.04em;
      color: var(--crema-text);
      background: rgba(255, 255, 255, 0.4);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid var(--crema-stroke);
      border-radius: 14px;
      opacity: 0;
      transform: translateX(12px);
      transition: opacity 0.3s ease, transform 0.3s ease;
      pointer-events: none;
    }
    #notif.visible {
      opacity: 1;
      transform: translateX(0);
    }

    #screen {
      max-width: 90vw;
      text-align: center;
      line-height: 1.15;
    }

    /* ===== Mega Type idle (from "01 _ Display idle" canvas) =====
     * Full-bleed composition: huge left-anchored clock, footer stats,
     * left rainbow spine, crema·aurel watermark, corner sun glow.
     * #screen.idle escapes the body flex-center and fills the viewport. */
    #screen.idle {
      position: absolute;
      inset: 0;
      max-width: none;
      text-align: left;
    }

    /* Left rainbow spine — the Currents signature, reduced to a 14px edge.
     * Replaces the bottom rainbow stripe (suppressed in idle below). */
    .idle-spine {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 14px;
      background: linear-gradient(180deg,
        var(--band-2), var(--band-1), var(--band-7), var(--band-6), var(--band-4));
      opacity: 0.9;
    }

    /* Sun glow bleeding off the top-right corner. */
    .idle-glow {
      position: absolute;
      top: -160px;
      right: -160px;
      width: 420px;
      height: 420px;
      border-radius: 50%;
      background: radial-gradient(circle,
        var(--band-2) 0%, var(--band-1) 48%, transparent 70%);
      opacity: 0.5;
      filter: blur(2px);
      pointer-events: none;
    }

    /* Vertical brand/owner watermark on the far-left edge. */
    .idle-watermark {
      position: absolute;
      left: 18px;
      top: 28px;
      writing-mode: vertical-rl;
      text-orientation: mixed;
      font-family: var(--crema-font-mono);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.35em;
      color: var(--crema-text);
      opacity: 0.45;
    }

    .idle-clock {
      position: absolute;
      left: 64px;
      top: 70px;
      font-family: var(--crema-font-serif);
      font-style: normal;
      font-size: 260px;
      font-weight: 400;
      line-height: 0.9;
      color: var(--crema-text);
      letter-spacing: -0.045em;
      font-variant-numeric: tabular-nums;
      transition: color 1.5s ease;
    }

    /* Footer stats row — labels in tracked mono, values in serif. */
    .idle-footer {
      position: absolute;
      left: 64px;
      bottom: 28px;
      display: flex;
      align-items: flex-end;
      gap: 22px;
    }
    .idle-stat {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }
    #msg-stat {
      flex-direction: row;
      align-items: flex-end;
      gap: 22px;
    }
    #msg-stat[hidden] { display: none; }
    .idle-stat-label {
      font-family: var(--crema-font-mono);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.25em;
      color: var(--crema-muted);
    }
    .idle-stat-value {
      font-family: var(--crema-font-serif);
      font-size: 26px;
      line-height: 1;
      color: var(--crema-text);
      font-variant-numeric: tabular-nums;
    }
    .idle-divider {
      width: 1px;
      align-self: stretch;
      min-height: 40px;
      background: var(--crema-text);
      opacity: 0.28;
    }
    .msg-stat-body {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }
    .msg-count {
      color: var(--crema-accent-deep);
      font-size: 26px;
    }
    .msg-from {
      font-family: var(--crema-font-mono);
      font-size: 11px;
      letter-spacing: 0.1em;
      color: var(--crema-muted);
      margin-left: 6px;
    }

    /* Message mode: in-flow, flex-centered by .stage. Kept transform-free so
     * the .msg enter animation (which animates transform) doesn't fight a
     * centering transform. */
    #screen.msg {
      width: 100%;
      max-width: 760px;
      padding: 0 24px;
    }

    /* Kill the old centered-idle sun disc (theme.css #screen.idle::before). */
    #screen.idle::before { content: none; }

    /* The Currents ripple + bottom rainbow stripe/plinth must live INSIDE the
     * scaled stage (a transformed ancestor creates a stacking context, so the
     * viewport-fixed theme.css versions would mis-layer once scaled). We
     * disable those here and re-author them on .stage. vw/vh become % of the
     * 800×480 stage — identical at scale 1, correct at every other scale. */
    body.crema-display::before,
    body.crema-display::after { content: none; }

    /* Currents ripple — suppressed in idle, raised in message mode. */
    .stage::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: 0;
      filter: blur(0.4px);
      transition: opacity 0.4s ease;
      background-image:
        radial-gradient(ellipse 110% 28% at 30% 65%, transparent 0 14.5%, rgba(232,137,110,0.55) 15% 15.3%, transparent 15.8% 100%),
        radial-gradient(ellipse 110% 28% at 30% 65%, transparent 0 21.5%, rgba(232,178,94,0.50)  22% 22.3%, transparent 22.8% 100%),
        radial-gradient(ellipse 110% 28% at 30% 65%, transparent 0 28.5%, rgba(217,210,119,0.45) 29% 29.3%, transparent 29.8% 100%),
        radial-gradient(ellipse 110% 28% at 30% 65%, transparent 0 35.5%, rgba(125,192,176,0.45) 36% 36.3%, transparent 36.8% 100%),
        radial-gradient(ellipse 110% 28% at 30% 65%, transparent 0 42.5%, rgba(111,155,209,0.45) 43% 43.3%, transparent 43.8% 100%),
        radial-gradient(ellipse 110% 28% at 30% 65%, transparent 0 49.5%, rgba(166,133,201,0.45) 50% 50.3%, transparent 50.8% 100%),
        radial-gradient(ellipse 110% 28% at 30% 65%, transparent 0 56.5%, rgba(196,111,161,0.45) 57% 57.3%, transparent 57.8% 100%),
        radial-gradient(ellipse 110% 28% at 30% 65%, transparent 0 63.5%, rgba(166,133,201,0.40) 64% 64.3%, transparent 64.8% 100%),
        radial-gradient(ellipse 110% 28% at 30% 65%, transparent 0 70.5%, rgba(111,155,209,0.38) 71% 71.3%, transparent 71.8% 100%),
        radial-gradient(ellipse 110% 28% at 30% 65%, transparent 0 77.5%, rgba(125,192,176,0.35) 78% 78.3%, transparent 78.8% 100%),
        radial-gradient(ellipse 110% 28% at 30% 65%, transparent 0 84.5%, rgba(217,210,119,0.30) 85% 85.3%, transparent 85.8% 100%),
        radial-gradient(ellipse 110% 28% at 30% 65%, transparent 0 91.5%, rgba(232,178,94,0.28)  92% 92.3%, transparent 92.8% 100%);
    }
    body.crema-display:has(#screen.msg) .stage::before { opacity: 0.82; }

    /* Bottom signature: rainbow stripe (suppressed in idle — the left spine
     * takes over) / plinth + stripe in message mode. */
    .stage::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 3px;
      background: var(--crema-rainbow);
      pointer-events: none;
      z-index: 50;
      opacity: 0;
      transition: height 0.4s ease, background 0.4s ease, opacity 0.4s ease;
    }
    body.crema-display:has(#screen.msg) .stage::after {
      height: 110px;
      background:
        linear-gradient(180deg, transparent 0%, var(--crema-plinth, #2A1F44) 100%),
        var(--crema-rainbow);
      background-repeat: no-repeat, no-repeat;
      background-size: 100% 100%, 100% 3px;
      background-position: 0 0, 0 100%;
      opacity: 1;
    }

    @keyframes msg-enter {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .msg {
      animation: msg-enter 280ms cubic-bezier(0.2, 0.7, 0.2, 1) both;
    }

    /* SENDER label — signature kerned, opacity 0.78 per Direction Sauge */
    .msg .from {
      font-size: clamp(13px, 1.5vw, 18px);
      color: var(--crema-text);
      opacity: 0.78;
      margin-bottom: 4px;
    }
    .msg .subtitle {
      font-size: clamp(12px, 1.2vw, 14px);
      color: var(--crema-muted);
      opacity: 0.75;
      margin-top: 4px;
      margin-bottom: 22px;
      font-variant-numeric: tabular-nums;
    }
    .msg .text {
      font-family: var(--crema-font-serif);
      font-size: clamp(38px, 6vw, 64px);
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.1;
      color: var(--crema-text);
    }
    .msg .text .reply-prefix {
      color: var(--crema-muted);
      margin-right: 0.4em;
      font-style: italic;
    }
    .msg .reply-context {
      font-family: var(--crema-font-serif);
      font-size: clamp(16px, 2.2vw, 24px);
      font-style: italic;
      color: var(--crema-muted);
      opacity: 0.78;
      max-width: 70vw;
      margin: 0 auto 18px;
      line-height: 1.3;
    }

    .reply-bar {
      margin-top: 36px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .reply-btn {
      min-height: 56px;
      min-width: 56px;
      padding: 12px 24px;
      font-family: inherit;
      font-size: clamp(18px, 2vw, 22px);
      font-weight: 500;
      color: var(--crema-accent);
      background: rgba(232, 137, 110, 0.1);
      border: 1.5px solid rgba(232, 137, 110, 0.4);
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.15s ease, transform 0.05s ease, border-color 0.15s ease, color 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .reply-btn:active {
      transform: scale(0.96);
      background: rgba(232, 137, 110, 0.22);
    }
    .reply-btn:disabled { opacity: 0.5; cursor: default; }
    /* Filled sage — unambiguous success. Was border-only on a sage-tinted
     * bg, which read too close to the resting state since presence and
     * accent share the same #A8C49C. */
    .reply-btn.sent {
      background: var(--crema-accent);
      border-color: var(--crema-accent);
      color: var(--crema-accent-ink);
    }
    .reply-btn.failed {
      background: rgba(179, 38, 30, 0.15);
      border-color: var(--crema-danger);
      color: var(--crema-danger);
    }

    .progress {
      margin: 32px auto 0;
      width: clamp(200px, 38vw, 360px);
      height: 3px;
      background: rgba(232, 137, 110, 0.12);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      width: 100%;
      height: 100%;
      background: var(--crema-accent);
      transform-origin: left center;
      transform: scaleX(1);
    }

    /* Shortcuts (V5) — vertical column on the right edge, tucked under the
     * corner glow so it clears the left-anchored clock and footer stats. */
    #shortcuts-bar {
      position: absolute;
      top: 132px;
      right: 30px;
      z-index: 40;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 12px;
      max-width: 240px;
    }
    #shortcuts-bar:empty { display: none; }
    .shortcut-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 12px 16px;
      min-width: 96px;
      min-height: 78px;
      font-family: inherit;
      background: rgba(232, 137, 110, 0.08);
      border: 1.5px solid rgba(232, 137, 110, 0.35);
      border-radius: 18px;
      cursor: pointer;
      transition: background 0.15s, transform 0.05s, border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
      color: var(--crema-text);
    }
    .shortcut-btn:active {
      transform: scale(0.96);
      background: rgba(232, 137, 110, 0.22);
    }
    .shortcut-btn:disabled {
      opacity: 0.32;
      cursor: default;
    }
    .shortcut-btn .icon {
      font-size: 26px;
      line-height: 1;
    }
    .shortcut-btn .lbl {
      font-size: 13px;
      font-weight: 500;
      color: var(--crema-text);
      max-width: 110px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .shortcut-btn.sent {
      background: rgba(232, 137, 110, 0.18);
      border-color: var(--crema-presence);
    }
    .shortcut-btn.failed {
      background: rgba(179, 38, 30, 0.18);
      border-color: var(--crema-danger);
    }

    /* ===== Mirage phase 3 — msg header signature ===== */
    /* Header row with avatar + sender block + EN RÉPONSE pill.
     * Left-aligned inside the centered .msg canvas. */
    .msg .msg-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 26px;
      text-align: left;
    }
    .msg .avatar {
      width: 44px;
      height: 44px;
      flex-shrink: 0;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--band-1), var(--band-7));
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--crema-font-serif);
      font-style: italic;
      font-weight: 400;
      font-size: 22px;
      color: #FFFFFF;
      box-shadow: 0 6px 16px -8px rgba(232, 137, 110, 0.55);
    }
    .msg .msg-header-text {
      flex: 1;
      min-width: 0;
    }
    /* From/subtitle sit in the header now; reset the legacy margins. */
    .msg .msg-header .from {
      margin-bottom: 2px;
      opacity: 1;
    }
    .msg .msg-header .subtitle {
      margin: 0;
      opacity: 0.78;
    }
    .msg .en-reponse-pill {
      flex-shrink: 0;
      padding: 6px 12px;
      background: rgba(255, 255, 255, 0.45);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border: 1px solid var(--crema-stroke);
      border-radius: 14px;
      font-family: var(--crema-font-mono);
      font-size: 11px;
      letter-spacing: 0.15em;
      color: var(--crema-muted);
      line-height: 1;
    }
    /* Reply quote left-aligned with corail leading bar (matches mock) */
    .msg .reply-context {
      max-width: 70vw;
      margin: 0 auto 22px;
      padding-left: 14px;
      border-left: 2px solid var(--crema-accent);
      text-align: left;
    }
  </style>
</head>
<body class="crema-display night">
  <div class="stage">
  <header class="topbar">
    <button id="dnd-btn" class="dnd-btn" type="button" aria-label="Ne pas déranger">
      <svg class="moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
      </svg>
    </button>
    <div id="presence-list"></div>
  </header>

  <div id="notif"></div>

  <main id="screen"></main>

  <footer id="shortcuts-bar"></footer>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    // ===== Elements =====
    const screen = document.getElementById('screen');
    const presenceList = document.getElementById('presence-list');
    const notifEl = document.getElementById('notif');
    const shortcutsBar = document.getElementById('shortcuts-bar');
    const dndBtn = document.getElementById('dnd-btn');
    let OWNER_NAME = '';

    // ===== Responsive stage scaling =====
    // Scale the 800×480 stage to fit the viewport (contain), so the whole
    // composition stays proportional on phone / tablet / desktop.
    const STAGE_W = 800;
    const STAGE_H = 480;
    function fitStage() {
      const scale = Math.min(window.innerWidth / STAGE_W, window.innerHeight / STAGE_H);
      document.documentElement.style.setProperty('--stage-scale', scale);
    }
    fitStage();
    window.addEventListener('resize', fitStage);

    const DEFAULT_DISPLAY_MS = 30_000;
    const REPLY_DISPLAY_MS = 10_000;
    const MIN_DISPLAY_MS = 2_000;
    const REPLY_RETURN_DELAY_MS = 1_500;
    const NOTIF_VISIBLE_MS = 10_000;
    const REPLY_CONTEXT_MAX_CHARS = 60;
    const QUEUE_CAP = 5;
    const QUEUE_DRAIN_DELAY_MS = 600;
    const NOTIF_PREVIEW_MAX_CHARS = 36;

    const weekdayFmt = new Intl.DateTimeFormat('fr-FR', { weekday: 'long' });
    const timeFmt = new Intl.DateTimeFormat('fr-FR', {
      hour: '2-digit', minute: '2-digit', hour12: false,
    });
    // Compact footer date — "lundi 18.05" per the Mega Type canvas.
    function formatDateCompact(d) {
      const dd = String(d.getDate()).padStart(2, '0');
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      return `${weekdayFmt.format(d)} ${dd}.${mm}`;
    }

    // ===== State =====
    let mode = 'idle';
    let resetTimer = null;
    let notifTimer = null;
    let currentMsg = null;
    let replies = [];
    let shortcuts = [];
    const peers = new Map();
    let dndEnabled = false;
    const messageQueue = [];
    const typingOwners = new Map(); // owner → auto-clear timeout id

    // ===== Time formatting =====
    function formatAgo(ms) {
      const s = Math.max(0, Math.floor(ms / 1000));
      if (s < 60) return `il y a ${s} s`;
      const m = Math.floor(s / 60);
      if (m < 60) return `il y a ${m} min`;
      const h = Math.floor(m / 60);
      const rem = m % 60;
      return `il y a ${h} h${rem > 0 ? ` ${rem} min` : ''}`;
    }
    function formatRemaining(ms) {
      if (ms <= 0) return 'expiré';
      const s = Math.ceil(ms / 1000);
      if (s < 60) return `encore ${s} s`;
      const m = Math.ceil(s / 60);
      if (m < 60) return `encore ${m} min`;
      const h = Math.floor(m / 60);
      const rem = m % 60;
      return `encore ${h} h${rem > 0 ? ` ${rem} min` : ''}`;
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (c) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
      }[c]));
    }

    function truncate(s, max) {
      return s.length > max ? s.slice(0, max - 1).trimEnd() + '…' : s;
    }

    // ===== Render =====
    function renderIdle() {
      const now = new Date();
      const mode = document.body.classList.contains('day') ? 'jour' : 'nuit';
      screen.className = 'idle';
      screen.innerHTML = `
        <div class="idle-spine"></div>
        <div class="idle-glow"></div>
        <div class="idle-watermark">crema · ${escapeHtml(OWNER_NAME.toLowerCase())}</div>
        <div class="idle-clock">${timeFmt.format(now)}</div>
        <footer class="idle-footer">
          <div class="idle-stat">
            <span class="idle-stat-label">${mode}</span>
            <span class="idle-stat-value">${escapeHtml(formatDateCompact(now))}</span>
          </div>
          <div class="idle-stat" id="msg-stat" hidden>
            <span class="idle-divider"></span>
            <div class="msg-stat-body">
              <span class="idle-stat-label">messages</span>
              <span class="idle-stat-value"><span class="msg-count">0</span><span class="msg-from"></span></span>
            </div>
          </div>
        </footer>
      `;
      updateMsgStat();
    }

    function showIdle() {
      mode = 'idle';
      currentMsg = null;
      if (resetTimer) { clearTimeout(resetTimer); resetTimer = null; }
      renderIdle();
      renderShortcuts();
      maybeDrainNext();
    }

    function showMessage(data) {
      mode = 'message';
      // Use arrivedAt if set (message was queued), else stamp now.
      // This keeps the "il y a Xs" subtitle honest for drained messages.
      const receivedAt = data.arrivedAt ?? Date.now();
      const expiresAtMs = data.expiresAt ? Date.parse(data.expiresAt) : null;
      currentMsg = { ...data, receivedAt, expiresAtMs };
      renderMessage();
      renderShortcuts(); // will hide while in message mode

      if (resetTimer) clearTimeout(resetTimer);
      const ttl = expiresAtMs
        ? Math.max(MIN_DISPLAY_MS, expiresAtMs - Date.now())
        : (data.isReply ? REPLY_DISPLAY_MS : DEFAULT_DISPLAY_MS);
      resetTimer = setTimeout(showIdle, ttl);

      if (expiresAtMs) startProgressAnimation(ttl);

      // Tell the original sender we just displayed their message (V6.1).
      // Replies don't carry an id over the wire, skip them.
      if (data.id && data.fromInstanceId && !data.isReply) {
        socket.emit('msg:read', { id: data.id, fromInstanceId: data.fromInstanceId });
      }
    }

    function renderMessage() {
      if (!currentMsg) return;
      const { text, from, isReply, replyToText } = currentMsg;
      const initial = from ? escapeHtml(from.charAt(0).toUpperCase()) : '';
      const avatar = initial ? `<div class="avatar">${initial}</div>` : '';
      const fromLabel = from ? `<div class="from crema-label">${escapeHtml(from)}</div>` : '';
      const subtitleHtml = `<div class="subtitle">${buildSubtitle()}</div>`;
      const pill = isReply ? '<div class="en-reponse-pill">EN RÉPONSE</div>' : '';
      const header = `<div class="msg-header">${avatar}<div class="msg-header-text">${fromLabel}${subtitleHtml}</div>${pill}</div>`;
      const context = (isReply && replyToText)
        ? `<div class="reply-context">«&nbsp;${escapeHtml(truncate(replyToText, REPLY_CONTEXT_MAX_CHARS))}&nbsp;»</div>`
        : '';
      const progress = currentMsg.expiresAtMs
        ? '<div class="progress"><div class="progress-fill"></div></div>'
        : '';
      screen.className = 'msg';
      screen.innerHTML = `${header}${context}<div class="text">${escapeHtml(text)}</div>${replyBarHtml()}${progress}`;
    }

    function buildSubtitle() {
      if (!currentMsg) return '';
      const ago = formatAgo(Date.now() - currentMsg.receivedAt);
      if (currentMsg.expiresAtMs) {
        return `${ago} · ${formatRemaining(currentMsg.expiresAtMs - Date.now())}`;
      }
      return ago;
    }

    function refreshSubtitleInPlace() {
      if (mode !== 'message') return;
      const sub = screen.querySelector('.subtitle');
      if (sub) sub.textContent = buildSubtitle();
    }

    function activeReplyItems() {
      if (!currentMsg) return [];
      const opts = currentMsg.responseOptions;
      return (opts && opts.length > 0) ? opts : replies;
    }

    function replyBarHtml() {
      if (!currentMsg) return '';
      const { fromInstanceId, isReply } = currentMsg;
      if (isReply || !fromInstanceId) return '';
      const items = activeReplyItems();
      if (items.length === 0) return '';
      const buttons = items
        .map((r, i) => `<button class="reply-btn" data-i="${i}">${escapeHtml(r.label)}</button>`)
        .join('');
      return `<div class="reply-bar">${buttons}</div>`;
    }

    function startProgressAnimation(durationMs) {
      const fill = screen.querySelector('.progress-fill');
      if (!fill) return;
      // Reset to full, force reflow, then animate to empty over the TTL.
      fill.style.transition = 'none';
      fill.style.transform = 'scaleX(1)';
      void fill.offsetHeight;
      fill.style.transition = `transform ${durationMs}ms linear`;
      fill.style.transform = 'scaleX(0)';
    }

    function renderPresence() {
      if (peers.size === 0) { presenceList.innerHTML = ''; return; }
      const seenOwners = new Set();
      const rows = [];
      for (const owner of peers.values()) {
        if (seenOwners.has(owner)) continue;
        seenOwners.add(owner);
        const statusHtml = typingOwners.has(owner)
          ? `écrit<span class="typing-dots"><span>.</span><span>.</span><span>.</span></span>`
          : 'en ligne';
        rows.push(`
          <div class="presence">
            <span class="dot"></span>
            <span><span class="name crema-label">${escapeHtml(owner)}</span> ${statusHtml}</span>
          </div>
        `);
      }
      presenceList.innerHTML = rows.join('');
    }

    function isOwnerOnline(owner) {
      for (const o of peers.values()) if (o === owner) return true;
      return false;
    }

    function renderShortcuts() {
      if (mode !== 'idle' || shortcuts.length === 0) {
        shortcutsBar.innerHTML = '';
        return;
      }
      shortcutsBar.innerHTML = shortcuts.map((s, i) => {
        const online = isOwnerOnline(s.targetOwner);
        const iconHtml = s.icon ? `<span class="icon">${escapeHtml(s.icon)}</span>` : '';
        return `
          <button class="shortcut-btn" data-i="${i}" ${online ? '' : 'disabled'}>
            ${iconHtml}
            <span class="lbl">${escapeHtml(s.label)}</span>
          </button>
        `;
      }).join('');
    }

    function showNotif(text) {
      notifEl.textContent = text;
      notifEl.classList.add('visible');
      if (notifTimer) clearTimeout(notifTimer);
      notifTimer = setTimeout(() => notifEl.classList.remove('visible'), NOTIF_VISIBLE_MS);
    }

    // ===== DND + message queue =====
    function updateDndUI() {
      dndBtn.classList.toggle('on', dndEnabled);
    }

    // Footer "messages · NN · de flo" stat — live count of held messages
    // (queued under DND or while another is on screen). Only exists in the
    // idle DOM, so this is a no-op in message mode; renderIdle re-syncs it.
    function updateMsgStat() {
      const stat = document.getElementById('msg-stat');
      if (!stat) return;
      const n = messageQueue.length;
      if (n === 0) { stat.hidden = true; return; }
      stat.hidden = false;
      stat.querySelector('.msg-count').textContent = String(n).padStart(2, '0');
      const last = messageQueue[messageQueue.length - 1];
      const from = last && last.from ? last.from : '';
      stat.querySelector('.msg-from').textContent = from ? ` de ${from}` : '';
    }

    function queueIncoming(data) {
      if (messageQueue.length >= QUEUE_CAP) messageQueue.shift();
      messageQueue.push(data);
      updateMsgStat();
      const sender = data.from ? `${data.from} · ` : '';
      const ts = timeFmt.format(new Date(data.arrivedAt));
      showNotif(`${sender}${ts} · ${truncate(data.text, NOTIF_PREVIEW_MAX_CHARS)}`);
    }

    function maybeDrainNext() {
      if (messageQueue.length === 0 || dndEnabled || mode !== 'idle') return;
      const next = messageQueue.shift();
      updateMsgStat();
      setTimeout(() => {
        if (mode === 'idle' && !dndEnabled) showMessage(next);
      }, QUEUE_DRAIN_DELAY_MS);
    }

    async function toggleDnd() {
      const next = !dndEnabled;
      try {
        const r = await fetch('/dnd', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ enabled: next }),
        });
        if (!r.ok) throw new Error();
        // Optimistic flip — dnd:updated will reconfirm shortly.
        dndEnabled = next;
        updateDndUI();
        if (!dndEnabled) maybeDrainNext();
      } catch {
        showNotif('Impossible de modifier le mode');
      }
    }

    dndBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      toggleDnd();
    });

    async function loadDnd() {
      try {
        const r = await fetch('/dnd');
        const data = await r.json();
        dndEnabled = data.enabled === true;
        updateDndUI();
      } catch {}
    }
    loadDnd();

    // Owner of this Pi — drives the crema·<owner> idle watermark.
    async function loadOwner() {
      try {
        const r = await fetch('/me');
        const data = await r.json();
        if (data.owner) {
          OWNER_NAME = data.owner;
          if (mode === 'idle') renderIdle();
        }
      } catch {}
    }
    loadOwner();

    // ===== Reply handling + tap-to-dismiss =====
    screen.addEventListener('click', async (e) => {
      const btn = e.target.closest('.reply-btn');

      // Tap anywhere outside a reply button → dismiss the current message.
      if (!btn) {
        if (mode === 'message') showIdle();
        return;
      }

      // Disabled button (already replied / failed): swallow the tap so the
      // user doesn't accidentally dismiss the "✓ Sent" feedback.
      if (btn.disabled || !currentMsg?.fromInstanceId) return;

      const idx = Number(btn.dataset.i);
      const items = activeReplyItems();
      const reply = items[idx];
      if (!reply) return;

      const allBtns = screen.querySelectorAll('.reply-btn');
      for (const b of allBtns) b.disabled = true;

      try {
        const r = await fetch('/reply', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            to: currentMsg.fromInstanceId,
            label: reply.label,
            replyToMsgId: currentMsg.id || null,
          }),
        });
        if (!r.ok) throw new Error('send failed');
        btn.classList.add('sent');
        btn.textContent = '✓ ' + reply.label;
        if (resetTimer) clearTimeout(resetTimer);
        resetTimer = setTimeout(showIdle, REPLY_RETURN_DELAY_MS);
      } catch {
        btn.classList.add('failed');
        btn.textContent = '✕ ' + reply.label;
        setTimeout(() => {
          for (const b of allBtns) b.disabled = false;
          btn.classList.remove('failed');
          btn.textContent = reply.label;
        }, 2000);
      }
    });

    // ===== Clock + subtitle tick =====
    showIdle();
    const msToNextSecond = 1_000 - (Date.now() % 1_000);
    setTimeout(() => {
      tickEverySecond();
      setInterval(tickEverySecond, 1_000);
    }, msToNextSecond);

    function tickEverySecond() {
      if (mode === 'idle') {
        // Only re-render the clock when the minute rolls over.
        if (Date.now() % 60_000 < 1_000) renderIdle();
      } else if (mode === 'message') {
        refreshSubtitleInPlace();
      }
    }

    // ===== Day/night theme =====
    let schedule = null;

    async function loadSchedule() {
      try {
        const r = await fetch('/theme-schedule');
        schedule = await r.json();
        applyTheme();
      } catch {}
    }

    function applyTheme() {
      if (!schedule) return;
      const now = new Date();
      const sunrise = new Date(schedule.sunrise);
      const sunset = new Date(schedule.sunset);
      const isDay = now >= sunrise && now < sunset;
      const wasDay = document.body.classList.contains('day');
      document.body.classList.toggle('day', isDay);
      document.body.classList.toggle('night', !isDay);
      // Re-render so the footer jour/nuit label tracks the flip.
      if (isDay !== wasDay && mode === 'idle') renderIdle();
    }

    function scheduleMidnightRefresh() {
      const now = new Date();
      const next = new Date(now);
      next.setDate(now.getDate() + 1);
      next.setHours(0, 0, 30, 0);
      setTimeout(async () => {
        await loadSchedule();
        scheduleMidnightRefresh();
      }, next - now);
    }

    loadSchedule();
    setInterval(applyTheme, 60_000);
    scheduleMidnightRefresh();

    // ===== Replies fetch =====
    async function loadReplies() {
      try {
        const r = await fetch('/replies');
        replies = await r.json();
        if (mode === 'message') renderMessage();
      } catch {}
    }
    loadReplies();

    // ===== Shortcuts fetch + tap handler =====
    async function loadShortcuts() {
      try {
        const r = await fetch('/shortcuts');
        shortcuts = await r.json();
        renderShortcuts();
      } catch {}
    }
    loadShortcuts();

    shortcutsBar.addEventListener('click', async (e) => {
      const btn = e.target.closest('.shortcut-btn');
      if (!btn || btn.disabled) return;
      const i = Number(btn.dataset.i);
      const s = shortcuts[i];
      if (!s) return;

      const allBtns = shortcutsBar.querySelectorAll('.shortcut-btn');
      for (const b of allBtns) b.disabled = true;

      const lblEl = btn.querySelector('.lbl');
      const originalLabel = lblEl ? lblEl.textContent : '';

      try {
        const r = await fetch('/shortcut/send', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id: s.id }),
        });
        if (!r.ok) throw new Error();
        btn.classList.add('sent');
        if (lblEl) lblEl.textContent = '✓ Envoyé';
        setTimeout(renderShortcuts, 1500);
      } catch {
        btn.classList.add('failed');
        if (lblEl) lblEl.textContent = '✕ Échec';
        setTimeout(() => {
          btn.classList.remove('failed');
          if (lblEl) lblEl.textContent = originalLabel;
          renderShortcuts();
        }, 2000);
      }
    });

    // ===== Socket =====
    const socket = io();

    socket.on('peers:init', (list) => {
      peers.clear();
      for (const p of list) peers.set(p.instanceId, p.owner);
      renderPresence();
      renderShortcuts();
    });
    socket.on('peer:up', ({ instanceId, owner }) => {
      peers.set(instanceId, owner);
      renderPresence();
      renderShortcuts();
    });
    socket.on('peer:down', ({ instanceId }) => {
      peers.delete(instanceId);
      renderPresence();
      renderShortcuts();
    });

    socket.on('replies:updated', (list) => {
      replies = list;
      if (mode === 'message') renderMessage();
    });

    socket.on('shortcuts:updated', (list) => {
      shortcuts = list;
      renderShortcuts();
    });

    socket.on('message', (data) => {
      if (!data || typeof data.text !== 'string' || !data.text.trim()) return;
      // Stamp the arrival time so the "il y a Xs" subtitle stays honest
      // even if the message sits in the queue for a while.
      data.arrivedAt = Date.now();
      // Hold the message back if we're already showing one or DND is on.
      // It'll be drained later from the queue.
      if (mode === 'message' || dndEnabled) {
        queueIncoming(data);
      } else {
        showMessage(data);
      }
    });

    socket.on('msg:expired', ({ text, targetOwner }) => {
      showNotif(`« ${truncate(text, 40)} » sans réponse de ${targetOwner}`);
    });

    socket.on('dnd:updated', ({ enabled }) => {
      const was = dndEnabled;
      dndEnabled = enabled === true;
      updateDndUI();
      if (was && !dndEnabled) maybeDrainNext();
    });

    // V6.2 — typing indicator from a peer's PWA. Auto-clears 5 s after the
    // last 'start' renew, so a lost 'stop' won't leave the dots stuck.
    socket.on('typing', ({ from, state }) => {
      if (!from) return;
      const existing = typingOwners.get(from);
      if (existing) clearTimeout(existing);
      if (state === 'start') {
        const timer = setTimeout(() => {
          typingOwners.delete(from);
          renderPresence();
        }, 5000);
        typingOwners.set(from, timer);
      } else {
        typingOwners.delete(from);
      }
      renderPresence();
    });
  </script>
</body>
</html>
